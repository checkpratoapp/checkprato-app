<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CheckPrato Elite — Saúde</title>
  <style>
    :root {
      --bg: #050a14; --card: rgba(13, 25, 45, 0.98);
      --blue: #3b82f6; --text: #eaf2ff; --muted: #8aa0c7;
      --max-w: 450px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
    
    .app-shell { width: 100%; max-width: var(--max-w); background: #050a14; display: flex; flex-direction: column; min-height: 100vh; position: relative; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); }
    
    .page { display: none; padding: 30px; flex-direction: column; animation: fadeIn 0.4s ease; }
    .page.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .glass-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    
    .btn-main { background: linear-gradient(135deg, var(--blue), #1d4ed8); color: white; border: none; border-radius: 15px; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    
    /* Nav */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: var(--max-w); background: #0a1628; display: none; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    .nav.active { display: flex; }
    .nav-item { background: none; border: none; color: var(--muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 12px; }

    /* Avatar */
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 20px; }
    .avt { width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--blue); }
  </style>
</head>
<body>

  <div class="app-shell">
    <div id="p-login" class="page active">
      <div style="text-align: center; margin-top: 100px;">
        <h1 style="font-size: 35px; margin-bottom: 10px;">CheckPrato <span style="color:var(--blue)">Elite</span></h1>
        <p style="color:var(--muted); margin-bottom: 50px;">Foco total em sua saúde.</p>
        <div class="glass-card">
           <button id="btn-auth" class="btn-main">Entrar com Google (Pop-up)</button>
           <p id="msg-erro" style="color: #ff4d4d; font-size: 12px; margin-top: 15px; display: none;"></p>
        </div>
      </div>
    </div>

    <div id="p-setup" class="page">
      <h2>Perfil de Saúde</h2>
      <div class="glass-card" style="margin-top:20px;">
        <p>Qual seu esporte?</p>
        <select id="set-sport" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; background:#111; color:white; border:1px solid #333;">
          <option>Musculação</option>
          <option>Jiu-Jitsu</option>
          <option>Muay Thai</option>
          <option>Corrida</option>
        </select>
        <button class="btn-main" onclick="save()">Concluir</button>
      </div>
    </div>

    <div id="p-home" class="page">
      <div id="user-info"></div>
      <div class="glass-card">
        <h3>Painel de Saúde</h3>
        <p style="color:var(--muted); margin-top:10px;">IA: Lembre-se de beber água para sua recuperação muscular.</p>
      </div>
    </div>

    <nav class="nav" id="main-nav">
      <button class="nav-item" onclick="show('p-home')"><span>❤️</span>Saúde</button>
      <button class="nav-item" onclick="logout()"><span>🚪</span>Sair</button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
    import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

    const config = {
      apiKey: "AIzaSyCZTpsIEJqdxjc6E4KZaqogtkuyLn9uTDY",
      authDomain: "checkprato-a900b.firebaseapp.com",
      projectId: "checkprato-a900b",
      storageBucket: "checkprato-a900b.firebasestorage.app",
      messagingSenderId: "588806296180",
      appId: "1:588806296180:web:77918231454174a7d6e87a"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // LOGIN POR POP-UP (MUITO MAIS SEGURO PARA GITHUB PAGES)
    document.getElementById('btn-auth').onclick = async () => {
      try {
        const res = await signInWithPopup(auth, provider);
        checkUser(res.user);
      } catch (e) {
        document.getElementById('msg-erro').innerText = "Erro: " + e.message;
        document.getElementById('msg-erro').style.display = "block";
      }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) checkUser(user);
      else show('p-login');
    });

    async function checkUser(user) {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists() && snap.data().done) {
        start(snap.data());
      } else {
        show('p-setup');
      }
    }

    window.save = async () => {
      const user = auth.currentUser;
      const data = { name: user.displayName, sport: document.getElementById('set-sport').value, done: true };
      await setDoc(doc(db, "users", user.uid), data, { merge: true });
      start(data);
    };

    function start(data) {
      show('p-home');
      document.getElementById('main-nav').classList.add('active');
      document.getElementById('user-info').innerHTML = `
        <div class="header">
          <img class="avt" src="https://api.dicebear.com/7.x/adventurer/svg?seed=${data.name}">
          <div>
            <p><strong>${data.name}</strong></p>
            <p style="font-size:12px; color:var(--blue)">Esporte: ${data.sport}</p>
          </div>
        </div>
      `;
    }

    function show(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(id === 'p-login' || id === 'p-setup') document.getElementById('main-nav').classList.remove('active');
    }

    window.logout = () => signOut(auth).then(() => location.reload());
  </script>
</body>
</html>
