    const OFFICIAL_SITES = {
      imc: [

        "https://www.cdc.gov/mentalhealth/"
      ]
    };

    /***********************
     * STORAGE KEYS
     ***********************/
    const KEY_PROFILE = "cp_profile_v2";
    const KEY_AUTH = "cp_auth_ok_v1";          // acesso blindado (local)
    const KEY_STEP = "cp_step_v1";             // 1 acesso, 2 cadastro, 3 boasvindas, 4 liberado
    const KEY_ONBOARD = "cp_onboard_done_v1";  // compat
    const KEY_PLATE_LAST = "cp_plate_last_v1";
    const KEY_PLATES = "cp_plates_v1";
    const KEY_TRAIN_DONE = "cp_train_done_v2"; // exercícios concluídos com anti-burlar
    const KEY_XP = "cp_xp_v1";
    const KEY_DIETA_LAST = "cp_dieta_last_v1";
    const KEY_TREINO_LAST = "cp_treino_last_v1";

    /***********************
     * UTILS
     ***********************/
    function safeJsonParse(s, fallback){ try { return JSON.parse(s); } catch { return fallback; } }
    function escapeHtml(s){ return String(s ?? "").replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m])); }
    function now(){ return Date.now(); }
    function todayKey(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

    function getXP(){ return Number(localStorage.getItem(KEY_XP) || "0"); }
    function addXP(v){ localStorage.setItem(KEY_XP, String(getXP() + Number(v||0))); }

    function getStep(){ return Number(localStorage.getItem(KEY_STEP) || "1"); }
    function setStep(n){ localStorage.setItem(KEY_STEP, String(n)); }

    function isAuthed(){ return localStorage.getItem(KEY_AUTH) === "1"; }
    function setAuthed(v){ localStorage.setItem(KEY_AUTH, v ? "1" : "0"); }

    function isOnboardDone(){ return localStorage.getItem(KEY_ONBOARD) === "1"; }
    function setOnboardDone(v){ localStorage.setItem(KEY_ONBOARD, v ? "1" : "0"); }

    function loadProfile(){ return safeJsonParse(localStorage.getItem(KEY_PROFILE) || "null", null); }
    function saveProfile(p){ localStorage.setItem(KEY_PROFILE, JSON.stringify(p)); }

    function loadPlates(){ return safeJsonParse(localStorage.getItem(KEY_PLATES) || "[]", []); }
    function savePlates(arr){ localStorage.setItem(KEY_PLATES, JSON.stringify(arr)); }

    function loadTrainDone(){ return safeJsonParse(localStorage.getItem(KEY_TRAIN_DONE) || "[]", []); }
    function saveTrainDone(arr){ localStorage.setItem(KEY_TRAIN_DONE, JSON.stringify(arr)); }

    function loadDietaLast(){ return safeJsonParse(localStorage.getItem(KEY_DIETA_LAST) || "null", null); }
    function saveDietaLast(d){ localStorage.setItem(KEY_DIETA_LAST, JSON.stringify(d)); }

    function loadTreinoLast(){ return safeJsonParse(localStorage.getItem(KEY_TREINO_LAST) || "null", null); }
    function saveTreinoLast(t){ localStorage.setItem(KEY_TREINO_LAST, JSON.stringify(t)); }

    function getProfileDisplay(){
      const p = loadProfile();
      const fullName = p ? `${p.nome || ""} ${p.sobrenome || ""}`.trim() : "";
      const name = fullName || "Visitante";
      const sub = isOnboardDone() ? "Conta ativa" : "Cadastro pendente";
      const avatar = p?.avatarDataUrl || "";
      return { name, sub, avatar };
    }

    /***********************
     * STATE (UI)
     ***********************/
    let currentScreen = "splash";
    let lastScreen = "";
    let toastMsg = "";
    let toastShow = false;

    // prato
    let plateDataUrl = localStorage.getItem(KEY_PLATE_LAST) || "";
    let plateAIResult = null; // {description, calories, protein, carbs, fat}
    let plateConfirmed = false;

    // dieta (gerada)
    let dietaType = "emagrecimento";

    // treino (sessão anti-burlar)
    let selectedSport = "musculação";
    let selectedIntensity = "Moderada";
    let selectedLevel = "Iniciante";
    let treinoSession = { id: "", startedAt: 0, lastMarkAt: 0 };

    /***********************
     * TOAST / NAV GUARD
     ***********************/
    function showToast(msg) {
      toastMsg = msg;
      toastShow = true;
      renderToast();
      setTimeout(() => { toastShow = false; renderToast(); }, 2400);
    }

    function canAccess(screen){
      // Fluxo travado por etapas
      const step = getStep(); // 1 acesso / 2 cadastro / 3 boas / 4 liberado
      const allowed = new Set(["splash","acesso","cadastro","boasvindas"]);

      if(step < 4){
        return allowed.has(screen);
      }
      return true;
    }

    function goTo(screen){
      if(!canAccess(screen)){
        showToast("Conclua o passo a passo para liberar as abas.");
        currentScreen = (getStep() === 1 ? "acesso" : getStep() === 2 ? "cadastro" : "boasvindas");
        render();
        return;
      }
      currentScreen = screen;
      render();
    }

    /***********************
     * MOUNT ONCE
     ***********************/
    function mountOnce(){
      const root = document.getElementById("root");
      root.innerHTML = `
        <div class="app-shell">
          <div id="screenSlot"></div>
          <div id="navSlot"></div>
          <div id="toastSlot"></div>
        </div>
      `;
    }

    function render(){
      const animate = (currentScreen !== lastScreen);
      lastScreen = currentScreen;

      const slot = document.getElementById("screenSlot");
      if(!slot) return;

      let html = "";
      if(currentScreen === "splash") html = renderSplash(animate);
      else if(currentScreen === "acesso") html = renderAcesso(animate);
      else if(currentScreen === "cadastro") html = renderCadastro(animate);
      else if(currentScreen === "boasvindas") html = renderBoasVindas(animate);
      else if(currentScreen === "dashboard") html = renderDashboard(animate);
      else if(currentScreen === "prato") html = renderPrato(animate);
      else if(currentScreen === "dieta") html = renderDieta(animate);
      else if(currentScreen === "treino") html = renderTreino(animate);
      else if(currentScreen === "evolucao") html = renderEvolucao(animate);
      else if(currentScreen === "progresso") html = renderProgresso(animate);
      else if(currentScreen === "saude") html = renderSaude(animate);
      else if(currentScreen === "loja") html = renderLoja(animate);
      else if(currentScreen === "convite") html = renderConvite(animate);
      else if(currentScreen === "perfil") html = renderPerfil(animate);
      else if(currentScreen === "mais") html = renderMais(animate);
      else html = renderDashboard(animate);

      slot.innerHTML = html;
      renderBottomNav();
      renderToast();

      // wires
      if(currentScreen === "cadastro") wireCadastroAvatar();
      if(currentScreen === "prato"){ wirePlateInputs(); renderPlatePreview(); }
    }

    function renderToast(){
      const toastSlot = document.getElementById("toastSlot");
      if(!toastSlot) return;
      toastSlot.innerHTML = `<div class="cp-toast ${toastShow ? "show" : ""}">${escapeHtml(toastMsg)}</div>`;
    }

    function renderBottomNav(){
      const navSlot = document.getElementById("navSlot");
      if(!navSlot) return;

      if(currentScreen === "splash" || getStep() < 4){
        navSlot.innerHTML = "";
        return;
      }

      const items = [
        { id:"dashboard", icon:"📊", label:"Início" },
        { id:"prato", icon:"🍽️", label:"Prato" },
        { id:"treino", icon:"💪", label:"Treino" },
        { id:"dieta", icon:"🥗", label:"Dieta" },
        { id:"mais", icon:"➕", label:"Mais" }
      ];

      navSlot.innerHTML = `

    function toggleEsporte(s){
      const p = loadProfile() || {};
      const arr = (p.esportes || []).map(x => String(x).toLowerCase());
      const key = String(s).toLowerCase();

      if(!SPORTS.includes(key)){
        showToast("Esporte não permitido.");
        return;
      }

      const has = arr.includes(key);
      const next = has ? arr.filter(x => x !== key) : [...arr, key];

      p.esportes = next;
      saveProfile(p);
      render();
    }

    function toggleCondicao(c){
      const p = loadProfile() || {};
      const arr = (p.condicoes || []).map(x => String(x));
      const has = arr.includes(c);
      const next = has ? arr.filter(x => x !== c) : [...arr, c];
      p.condicoes = next;
      saveProfile(p);
      render();
    }

    function saveCadastroFull(){
      if(!isAuthed()){
        showToast("Faça login primeiro.");
        goTo("acesso");
        return;
      }

      const nome = document.getElementById("cadNome")?.value?.trim() || "";
      const sobrenome = document.getElementById("cadSobrenome")?.value?.trim() || "";
      const peso = document.getElementById("cadPeso")?.value?.trim() || "";
      const altura = document.getElementById("cadAltura")?.value?.trim() || "";
      const objetivo = document.getElementById("cadObjetivo")?.value || "";
      const sexo = document.getElementById("cadSexo")?.value || "";
      const nivel = document.getElementById("cadNivel")?.value || "";
      const restricoes = document.getElementById("cadRestricoes")?.value?.trim() || "";
      const termsOk = !!document.getElementById("termsOk")?.checked;
      const permOk = !!document.getElementById("permOk")?.checked;

      const p = loadProfile() || {};
      const esportes = (p.esportes || []).map(x => String(x).toLowerCase()).filter(x => SPORTS.includes(x));

      // obrigatórios
      if(!nome || !sobrenome || !peso || !altura || !objetivo || !sexo || !nivel){
        showToast("Preencha nome, sobrenome, peso, altura, objetivo, sexo e nível.");

      }
      if(esportes.length === 0){
        showToast("Escolha pelo menos 1 esporte.");
        return;

      if(!termsOk || !permOk){
        showToast("Aceite termos e permissões.");

      const profile = {
        ...p,
        nome, sobrenome, peso, altura,
        objetivo, sexo, nivel,
        restricoes,
        esportes,
        termsOk, permOk,
        updatedAt: now()
      };
      saveProfile(profile);

      setStep(3);
      showToast("Cadastro completo ✅ Agora: boas-vindas.");
      goTo("boasvindas");

    /***********************
     * FILE READER
     ***********************/
    function readFileAsDataUrl(file){
      return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = ()=> resolve(String(reader.result || ""));
        reader.onerror = ()=> reject(new Error("Falha ao ler arquivo"));
        reader.readAsDataURL(file);
      });
    }

    async function analisarPrato(){
      if(!plateDataUrl){
        showToast("Envie uma foto primeiro.");
        return;
      }
      if(plateConfirmed){
        showToast("Essa análise já foi confirmada. Envie nova foto para outra.");
        return;
      }

      // Se IA não configurada: demo segura (sem inventar calorias “precisas” demais)
      if(!AI_ENDPOINT){
        showToast("IA não configurada (modo demo).");
        plateAIResult = demoPlateResult();
        fillMacros(plateAIResult);
        showConfirmBox();
        return;
      }

      showToast("Analisando com IA...");
      try{
        const base64 = plateDataUrl.split(",")[1] || "";
        const res = await fetch(AI_ENDPOINT, {
          method:"POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ imageBase64: base64 })
        });
        if(!res.ok){
          const t = await res.text().catch(()=> "");
          throw new Error(t || `HTTP ${res.status}`);
        }
        const data = await res.json();
        plateAIResult = data;
        fillMacros(plateAIResult);
        showConfirmBox();
        showToast("Resultado pronto ✅");
      }catch(e){
        showToast("Erro na IA: " + (e?.message || e));
      }
    }

    function buildDietText(base, stronger){
      const a = base === "hipertrofia"
        ? [
          "Café: 3 ovos + aveia + banana",
          "Almoço: frango/carne + arroz + feijão + salada",
          "Pré-treino: whey + fruta",
          "Jantar: proteína + carbo bom + legumes"
        ]
        : base === "emagrecimento"
        ? [
          "Café: 2 ovos + fruta + café sem açúcar",
          "Almoço: frango + salada grande + porção controlada de carbo",
          "Lanche: iogurte natural + castanhas",
          "Jantar: omelete + legumes"
        ]
        : [
          "Café: ovos + pão integral + fruta",
          "Almoço: proteína magra + carbo moderado + salada",
          "Lanche: fruta + iogurte",
          "Jantar: proteína + legumes"
        ];

      const extras = stronger
        ? ["Regra elite: água + 10min caminhada após almoço.", "Corte açúcar líquido. Sem exceção hoje.", "Priorize proteína em toda refeição."]
        : ["Mantenha constância. Sem ansiedade.", "Beba água. Durma cedo.", "Faça o básico bem feito."];

      return [
        "📌 Dieta do dia (variação)",
        "",
        ...a.map(x => "• " + x),
        "",
        "🔥 Diretriz:",
        "• " + pick(extras),
        "• " + pick(extras.filter(x => x !== extras[0])),
      ].join("\n");
    }

    function isExerciseDone(doneKey){
      const arr = loadTrainDone();
      return arr.some(x => x?.doneKey === doneKey);
    }

    function toggleExerciseDone(doneKey, exId, checked){
      // anti-burlar
      if(checked){
        if(!treinoSession.startedAt){
          showToast("Inicie a sessão primeiro.");
          render();
          return;
        }
        // não deixa marcar rápido
        const t = now();
        if(treinoSession.lastMarkAt && (t - treinoSession.lastMarkAt) < 8000){
          showToast("Muito rápido. Faça o exercício de verdade.");
          render();
          return;
        }
        treinoSession.lastMarkAt = t;

        const arr = loadTrainDone();
        if(arr.some(x => x?.doneKey === doneKey)){
          showToast("Já concluído hoje.");
          render();
          return;
        }

        arr.unshift({
          type: "exercise",
          doneKey,
          exId,
          createdAt: t
        });
        saveTrainDone(arr);
        addXP(5);
        showToast("Concluído ✅ +5 XP");
        render();
      } else {
        // permitir desmarcar? você pediu anti-burlar, então: NÃO.
        showToast("Não dá para desmarcar. (anti-burlar)");
        render();
      }
    }

    function openOfficial(key){
      const list = OFFICIAL_SITES[key] || OFFICIAL_SITES["nutricao"];
      // abre 2 sites diferentes pra não ficar monótono
      const a = pick(list);
      let b = pick(list);
      if(b === a && list.length > 1) b = list.find(x => x !== a) || b;

      window.open(a, "_blank");
      setTimeout(() => window.open(b, "_blank"), 250);
    }

    /***********************
     * HISTÓRICO / EVOLUÇÃO
     ***********************/
    function calcStreak(done){
      // streak por dias com pelo menos 1 exercício
      const byDay = new Set(done.filter(x => x?.type==="exercise").map(x => String(x.doneKey||"").split("::")[0]).filter(Boolean));
      if(byDay.size === 0) return 0;

      let streak = 0;
      let cursor = new Date();
      for(let i=0;i<60;i++){
        const key = cursor.toISOString().slice(0,10);
        if(byDay.has(key)){
          streak++;
          cursor.setDate(cursor.getDate()-1);
        } else break;
      }
      return streak;
    }

    function lastActivity(done, plates){
      const lastEx = done[0]?.createdAt ? new Date(done[0].createdAt) : null;
      const lastPl = plates[0]?.createdAt ? new Date(plates[0].createdAt) : null;

      const last = (!lastEx && !lastPl) ? null :
        (!lastPl ? lastEx :
         (!lastEx ? lastPl :
          (lastEx > lastPl ? lastEx : lastPl)));

      if(!last) return "—";
      const hh = String(last.getHours()).padStart(2,"0");
      const mm = String(last.getMinutes()).padStart(2,"0");
      return `${hh}:${mm}`;
    }

    function renderHistory(plates, done){
      const p = plates.slice(0,3);
      const d = done.filter(x=>x?.type==="exercise").slice(0,4);

      const a = p.length ? p.map(x => `
        <div style="padding:10px; border-radius:14px; border:1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); margin-top: 8px;">
          <div style="font-weight:950;">🍽️ Prato confirmado</div>
          <div class="cp-hint" style="margin-top:6px;">Kcal: <b>${escapeHtml(x.calories ?? "—")}</b> • P: <b>${escapeHtml(x.protein ?? "—")}</b>g • C: <b>${escapeHtml(x.carbs ?? "—")}</b>g • G: <b>${escapeHtml(x.fat ?? "—")}</b>g</div>
        </div>
      `).join("") : `<div class="cp-hint">Sem pratos confirmados ainda.</div>`;

      const b = d.length ? d.map(x => `
        <div style="padding:10px; border-radius:14px; border:1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); margin-top: 8px;">
          <div style="font-weight:950;">💪 Exercício concluído</div>
          <div class="cp-hint" style="margin-top:6px;">Data: <b>${escapeHtml(String(x.doneKey||"").split("::")[0] || "—")}</b></div>
        </div>
      `).join("") : `<div class="cp-hint" style="margin-top:10px;">Sem exercícios concluídos ainda.</div>`;

      return a + b;
    }

    /***********************
     * CONVITE
     ***********************/
    async function shareInvite(){
      const text = "Conheça o CheckPrato Elite: Dieta, Treino, Prato e Evolução. " + location.href;
      if(navigator.share){
        try{
          await navigator.share({ title:"CheckPrato Elite", text, url: location.href });
          showToast("Compartilhado ✅");
        }catch{
          showToast("Cancelado.");
        }
      } else {
        copyText(text);
        showToast("Compartilhar não suportado. Copiado ✅");
      }
    }

    function copyInvite(){
      const text = "Conheça o CheckPrato Elite: Dieta, Treino, Prato e Evolução. " + location.href;
      copyText(text);
      showToast("Copiado ✅");
    }

    function copyText(t){
      if(navigator.clipboard?.writeText){
        navigator.clipboard.writeText(t).catch(()=> {});
      } else {
        const ta = document.createElement("textarea");
        ta.value = t;
        document.body.appendChild(ta);
        ta.select();
        try{ document.execCommand("copy"); }catch{}
        document.body.removeChild(ta);
      }
    }

    /***********************
     * BOOT
     ***********************/
    function boot(){
      mountOnce();

      // etapa inicial
      const step = getStep();
      if(step >= 4){
        currentScreen = "dashboard";
      } else if(step === 3){
        currentScreen = "boasvindas";
      } else if(step === 2){
        currentScreen = "cadastro";
      } else {
        // step 1
        currentScreen = "splash";
      }

      render();
    }

    boot();
  </script>
