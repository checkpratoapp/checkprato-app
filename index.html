<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckPrato PRO</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;text-align:center}
header{background:#020617;padding:15px;font-weight:bold}
.menu{display:flex;background:#020617}
.menu button{flex:1;padding:12px;border:none;background:#00ff88;font-weight:bold}
.aba{display:none;padding:20px}
.ativa{display:block}
input{padding:10px;margin:5px;border-radius:8px;border:none;width:80%}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<header>CheckPrato 🔒 PRO</header>

<div class="menu">
<button onclick="trocarAba('home')">Home</button>
<button onclick="trocarAba('refeicoes')">Adicionar</button>
<button onclick="trocarAba('historico')">Histórico</button>
<button onclick="trocarAba('ranking')">Ranking</button>
</div>

<div id="home" class="aba ativa">
<h2>Conta</h2>
<p id="usuario">Não logado</p>
<p id="xp"></p>
<button onclick="login()">Login Google</button>
</div>

<div id="refeicoes" class="aba">
<h2>Nova Refeição</h2>
<input id="nome" placeholder="Comida">
<input id="calorias" type="number" placeholder="Calorias">
<br>
<button onclick="salvarRefeicao()">Salvar + XP</button>
</div>

<div id="historico" class="aba">
<h2>Histórico</h2>
<button onclick="carregarRefeicoes()">Atualizar</button>
<div id="lista"></div>
</div>

<div id="ranking" class="aba">
<h2>Ranking Global</h2>
<button onclick="carregarRanking()">Atualizar</button>
<div id="rankingLista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js";

// 🔥 CONFIG
const firebaseConfig = {
apiKey:"AIzaSyCZTpsIEJqdxjc6E4KZaqogtkuyLn9uTDY",
authDomain:"checkprato-a900b.firebaseapp.com",
projectId:"checkprato-a900b",
storageBucket:"checkprato-a900b.firebasestorage.app",
messagingSenderId:"242390673985",
appId:"1:242390673985:web:f658e933fc4e8b1e8834c0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// 🔥 FUNCTIONS (SEGURANÇA REAL)
const functions = getFunctions(app);
const salvarSeguro = httpsCallable(functions, "salvarRefeicaoSegura");

// --- UI ---
window.trocarAba = (aba)=>{
document.querySelectorAll('.aba').forEach(el=>el.classList.remove('ativa'));
document.getElementById(aba).classList.add('ativa');
}

// --- LOGIN ---
window.login = async ()=>{
await signInWithPopup(auth, provider);
}

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("usuario").innerText = "Logado: "+user.email;
}else{
document.getElementById("usuario").innerText = "Não logado";
}
});

// --- SALVAR COM SEGURANÇA (SERVER) ---
window.salvarRefeicao = async ()=>{
const nome = document.getElementById("nome").value;
const calorias = Number(document.getElementById("calorias").value);

try{
const res = await salvarSeguro({ nome, calorias });

document.getElementById("xp").innerText = "XP: "+res.data.xp;

alert("Salvo com XP seguro ✅");

}catch(e){
alert("Erro: "+e.message);
}
};

// --- HISTÓRICO ---
window.carregarRefeicoes = async ()=>{
const user = auth.currentUser;
if(!user) return;

const snap = await getDocs(collection(db,"usuarios",user.uid,"refeicoes"));

const lista = document.getElementById("lista");
lista.innerHTML="";

snap.forEach(doc=>{
const d = doc.data();
lista.innerHTML += `<div class="card">${d.nome} - ${d.calorias} kcal</div>`;
});
};

// --- RANKING GLOBAL ---
window.carregarRanking = async ()=>{
const q = query(collection(db,"ranking"), orderBy("xp","desc"), limit(10));
const snap = await getDocs(q);

const lista = document.getElementById("rankingLista");
lista.innerHTML="";

let pos = 1;

snap.forEach(doc=>{
const d = doc.data();
lista.innerHTML += `<div class="card">#${pos++} - XP: ${d.xp}</div>`;
});
};

</script>

</body>
</html>
