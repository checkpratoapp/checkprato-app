<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CheckPrato Elite — Saúde Integral</title>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; outline: none; }
    body{ background: #02050b; color:#eaf2ff; font-family: 'Segoe UI', sans-serif; overflow-x:hidden; }
    :root{ --blue:#3b82f6; --blue2:#2563eb; --muted:#8aa0c7; --stroke:rgba(255,255,255,0.08); --max:430px; --health-green: #22c55e; }
    
    .app-shell{ width:100%; min-height:100vh; display:flex; justify-content:center; }
    .page-wrap{ width:100%; max-width:var(--max); padding:20px 20px 140px; display:none; }
    .page-wrap.active{ display:block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }

    .cp-card{ background: rgba(11,26,45,0.95); border-radius:28px; padding:22px; margin-top:16px; border:1px solid var(--stroke); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    .btn-neon{ background: linear-gradient(135deg, var(--blue), var(--blue2)); color:#fff; font-weight:bold; border:none; border-radius:50px; padding:16px; width:100%; cursor:pointer; font-size:16px; transition: 0.3s; }
    
    .top-bar-game { background: rgba(11,26,45,0.8); border-radius: 20px; padding: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--stroke); }
    .mascote-avatar { width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--health-green); background:#000; overflow:hidden; }
    .mascote-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .xp-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top:6px; overflow:hidden; }
    .xp-bar-fill { height: 100%; background: var(--health-green); transition: width 0.6s ease; box-shadow: 0 0 10px var(--health-green); }

    .chip-item { padding:12px; border:1px solid var(--stroke); border-radius:14px; font-size:13px; text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); transition: 0.2s; }
    .chip-item.selected { border-color:var(--blue); background:rgba(59,130,246,0.2); color: white; font-weight: bold; }

    .bottom-nav{ position:fixed; bottom:0; width:100%; max-width:var(--max); background:rgba(7,23,40,0.98); backdrop-filter:blur(20px); border-top:1px solid var(--stroke); padding:12px; z-index:100; display:none; border-radius: 20px 20px 0 0; }
    .bottom-nav.active{ display:block; }
    .bottom-nav-inner{ display:flex; justify-content: space-around; }
    .nav-btn{ background:none; border:none; color:var(--muted); font-size:11px; display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:5px; }
    .nav-btn.active{ color:var(--blue); }
  </style>
</head>
<body>
  <div class="app-shell">
    
    <div id="screen-login" class="page-wrap active">
      <div style="text-align:center; margin-top:100px;">
        <h1 style="font-size:32px;">CheckPrato <span style="color:var(--blue)">Elite</span></h1>
        <p style="color:var(--muted); margin: 10px 0 50px;">Sua Saúde sob medida com IA</p>
        <button id="btn-login-google" class="btn-neon">Acessar Meu Painel de Saúde</button>
      </div>
    </div>

    <div id="screen-setup" class="page-wrap">
        <h2>Perfil de Saúde</h2>
        <div class="cp-card">
            <p style="font-weight:bold; margin-bottom:12px; font-size:14px;">Esporte Praticado:</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" id="sports-grid">
                <div class="chip-item" onclick="selectSingle(this)">🏋️ Musculação</div>
                <div class="chip-item" onclick="selectSingle(this)">🥋 Jiu-Jitsu</div>
                <div class="chip-item" onclick="selectSingle(this)">🥊 Muay Thai</div>
                <div class="chip-item" onclick="selectSingle(this)">🤸 Crossfit</div>
            </div>
        </div>
        <div class="cp-card">
            <p style="font-weight:bold; margin-bottom:12px; font-size:14px;">Restrições / Condições:</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" id="health-grid">
                <div class="chip-item" onclick="toggleMulti(this)">Diabetes</div>
                <div class="chip-item" onclick="toggleMulti(this)">Hipertensão</div>
                <div class="chip-item" onclick="toggleMulti(this)">Lactose</div>
                <div class="chip-item" onclick="toggleMulti(this)">Nenhuma</div>
            </div>
        </div>
        <button class="btn-neon" style="margin-top:25px;" onclick="finishSetup()">Começar Jornada</button>
    </div>

    <div id="main-content" style="width:100%;">
        <div id="tab-saude" class="page-wrap">
            <div class="header-slot"></div>
            <div class="cp-card">
                <h3>Minha Evolução</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
                    <div style="text-align:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:15px;"><span style="display:block; font-size:20px;">💧</span><small>Água: 1.2L</small></div>
                    <div style="text-align:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:15px;"><span style="display:block; font-size:20px;">🍏</span><small>Saúde: 90%</small></div>
                </div>
            </div>
        </div>

        <div id="tab-prato" class="page-wrap">
            <div class="header-slot"></div>
            <div class="cp-card">
                <h3>Verificar Refeição</h3>
                <div style="height:220px; background:#071728; border-radius:20px; margin:20px 0; display:flex; align-items:center; justify-content:center; border:1px dashed var(--muted); overflow:hidden;" id="preview-foto">
                    <span style="color:var(--muted)">📸 Capturar Foto</span>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-neon" style="background:#1e293b;" onclick="document.getElementById('in-cam').click()">Câmera</button>
                    <button class="btn-neon" style="background:#1e293b;" onclick="document.getElementById('in-gal').click()">Galeria</button>
                </div>
                <input type="file" id="in-cam" accept="image/*" capture="environment" style="display:none">
                <input type="file" id="in-gal" accept="image/*" style="display:none">
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-btn active" onclick="showTab('tab-saude')"><span>❤️</span>Saúde</button>
        <button class="nav-btn" onclick="showTab('tab-prato')"><span>🍽️</span>Prato</button>
        <button class="nav-btn" onclick="logout()"><span>🚪</span>Sair</button>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZTpsIEJqdxjc6E4KZaqogtkuyLn9uTDY", 
      authDomain: "checkprato-a900b.firebaseapp.com",
      projectId: "checkprato-a900b",
      storageBucket: "checkprato-a900b.firebasestorage.app",
      messagingSenderId: "588806296180",
      appId: "1:588806296180:web:77918231454174a7d6e87a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    getRedirectResult(auth).catch(err => console.error(err));
    document.getElementById('btn-login-google').addEventListener('click', () => signInWithRedirect(auth, provider));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        if (!snap.exists() || !snap.data().setupDone) {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-setup').classList.add('active');
        } else {
            initApp(snap.data());
        }
      }
    });

    window.selectSingle = (el) => {
        el.parentNode.querySelectorAll('.chip-item').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    };
    window.toggleMulti = (el) => el.classList.toggle('selected');

    window.finishSetup = async () => {
        const sport = document.querySelector('#sports-grid .selected')?.innerText || "Foco Saúde";
        const res = Array.from(document.querySelectorAll('#health-grid .selected')).map(el => el.innerText);
        const data = { name: currentUser.displayName, sport, restricoes: res, xp: 20, setupDone: true };
        await setDoc(doc(db, "users", currentUser.uid), data, { merge: true });
        initApp(data);
    };

    function initApp(data) {
        document.querySelectorAll('.page-wrap').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-saude').classList.add('active');
        document.getElementById('bottom-nav').classList.add('active');
        updateHeader(data);
    }

    function updateHeader(data) {
        const lvl = Math.floor(data.xp / 100) + 1;
        const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${data.name}`;
        const html = `
            <div class="top-bar-game">
                <div class="mascote-avatar"><img src="${avatarUrl}"></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
                        <span>${data.name}</span>
                        <span style="color:var(--health-green)">Lvl ${lvl}</span>
                    </div>
                    <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${data.xp % 100}%"></div></div>
                </div>
            </div>
        `;
        document.querySelectorAll('.header-slot').forEach(s => s.innerHTML = html);
    }

    window.showTab = (id) => {
        document.querySelectorAll('.page-wrap').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    const preview = (e) => {
        const file = e.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview-foto').innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
            }
            reader.readAsDataURL(file);
        }
    };
    document.getElementById('in-cam').onchange = preview;
    document.getElementById('in-gal').onchange = preview;

    window.logout = () => signOut(auth).then(() => location.reload());
  </script>
</body>
</html>
