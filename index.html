<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckPrato Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #05070a;
    --bg-panel: rgba(17, 24, 39, 0.7);
    --primary: #3b82f6;
    --text-main: #f3f4f6;
    --border: rgba(255,255,255,0.1);
}

body{
    margin:0;
    font-family:Poppins;
    background: radial-gradient(circle at 50% -20%, #1e293b 0%, #05070a 100%);
    color:white;
}

#app{max-width:480px;margin:auto;height:100vh;display:flex;flex-direction:column;}

.page{flex:1;padding:25px;overflow:auto;}

.avatar{
    text-align:center;
}

.avatar-box{
    font-size:80px;
    animation: float 3s infinite;
}

@keyframes float{
    50%{transform:translateY(-10px);}
}

.card{
    background:var(--bg-panel);
    border:1px solid var(--border);
    padding:20px;
    border-radius:20px;
    margin-top:15px;
}

.btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:15px;
    background:var(--primary);
    color:white;
    font-weight:bold;
}

.nav{
    display:flex;
    justify-content:space-around;
    background:#000;
    padding:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= ESTADO =================
let state = {
    screen:"home",
    xp: parseInt(localStorage.getItem("xp"))||0,
    lastXP: parseInt(localStorage.getItem("lastXP"))||0,
    dailyXP: parseInt(localStorage.getItem("dailyXP"))||0,
    firstAccess: localStorage.getItem("firstAccess") !== "false"
};

// ================= AVATAR =================
const AVATAR_STAGES = [
    {xp:0, icon:"🧍"},
    {xp:100, icon:"🧍‍♂️"},
    {xp:300, icon:"🦾"},
    {xp:700, icon:"🔥"},
    {xp:1500, icon:"👑"}
];

function getAvatar(){
    return [...AVATAR_STAGES].reverse().find(a=>state.xp>=a.xp);
}

// ================= PREMIUM =================
function isPremium(){
    if(state.firstAccess) return true;
    return localStorage.getItem("premium")==="true";
}

// ================= XP =================
function ganharXP(valor){

    const agora = Date.now();

    // trava tempo
    if(agora - state.lastXP < 8000){
        alert("Ação muito rápida.");
        return;
    }

    // limite diário
    if(state.dailyXP >= 200){
        alert("Limite diário atingido.");
        return;
    }

    state.xp += valor;
    state.dailyXP += valor;
    state.lastXP = agora;

    localStorage.setItem("xp",state.xp);
    localStorage.setItem("dailyXP",state.dailyXP);
    localStorage.setItem("lastXP",state.lastXP);

    render();
}

// ================= GEMINI =================
async function analisar(){
    if(!isPremium()){
        alert("Recurso Premium");
        return;
    }

    ganharXP(20);
    alert("Análise feita (Gemini depois)");
}

// ================= TELAS =================
function render(){

    const avatar = getAvatar();

    document.getElementById("app").innerHTML = `
    <div class="page">

        <div class="avatar">
            <div class="avatar-box">${avatar.icon}</div>
            <h2>XP: ${state.xp}</h2>
        </div>

        ${screen()}

    </div>

    <div class="nav">
        <button onclick="go('home')">Home</button>
        <button onclick="go('prato')">Prato</button>
        <button onclick="go('treino')">Treino</button>
        <button onclick="go('evolucao')">Evolução</button>
    </div>
    `;
}

function screen(){

    if(state.screen==="prato") return `
        <div class="card">
            <h3>Prato</h3>
            <button class="btn" onclick="analisar()">Analisar com IA</button>
        </div>
    `;

    if(state.screen==="treino") return `
        <div class="card">
            <h3>Treino</h3>
            <button class="btn" onclick="ganharXP(50)">Concluir</button>
        </div>
    `;

    if(state.screen==="evolucao") return `
        <div class="card">
            <h3>Evolução</h3>
            <p>Seu avatar evolui com XP</p>
        </div>
    `;

    return `
        <div class="card">
            <h3>Dashboard</h3>
            <p>Continue evoluindo</p>

            ${state.firstAccess ? `
            <div style="margin-top:10px;color:#10b981;">
                🎁 Premium liberado no primeiro acesso!
            </div>`:""}

            <button class="btn" onclick="ativarPago()">Ativar Premium</button>
        </div>
    `;
}

// ================= NAV =================
function go(s){
    state.screen=s;
    render();
}

// ================= PAGAMENTO =================
function ativarPago(){
    window.open("SEU_LINK_MERCADO_PAGO_AQUI");
}

// ================= INIT =================
if(state.firstAccess){
    localStorage.setItem("firstAccess","false");
}

render();

</script>

</body>
</html>
