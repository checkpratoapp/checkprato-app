<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckPrato</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

  <h1>CheckPrato 🍽️</h1>
  <p>Teste de salvamento no Firestore</p>
<input type="text" id="nomeRefeicao" placeholder="Digite a refeição">
<input type="number" id="calorias" placeholder="Calorias">
<br><br>
  <button onclick="salvarRefeicao()">Salvar refeição</button>
  
  <script type="module">
  // Importações do Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Configuração do Firebase (a sua já está correta)
  const firebaseConfig = {
    apiKey: "AIzaSyCZTpsIEJqdxjc6E4KZaqogtkuyLn9uTDY",
    authDomain: "checkprato-a900b.firebaseapp.com",
    databaseURL: "https://checkprato-a900b-default-rtdb.firebaseio.com",
    projectId: "checkprato-a900b",
    storageBucket: "checkprato-a900b.firebasestorage.app",
    messagingSenderId: "242390673985",
    appId: "1:242390673985:web:f658e933fc4e8b1e8834c0"
  };

  // Inicializa Firebase
  const app = initializeApp(firebaseConfig);

  // 🔥 Inicializa Firestore (ESSENCIAL)
  const db = getFirestore(app);

  // Função de teste para salvar dados
  async function salvarRefeicao() {
  try {
    const nome = document.getElementById("nomeRefeicao").value;
    const calorias = document.getElementById("calorias").value;

    await addDoc(collection(db, "refeicoes"), {
      nome: nome,
      calorias: Number(calorias),
      data: new Date()
    });

    alert("Refeição salva!");

  } catch (e) {
    console.error("Erro:", e);
    alert("Erro ao salvar!");
  }
  }

  // Tornar função acessível no botão
  window.salvarRefeicao = salvarRefeicao;
</script>
  
</body>
</html>
