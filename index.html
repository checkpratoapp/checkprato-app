<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CheckPrato Elite — Dieta • Treino • Prato • Progresso</title>

  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{ width:100%; height:100%; background:#02050b; color:#eaf2ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; overflow-x:hidden; }
    body{ background: radial-gradient(circle at 20% 0%, #0a1f38, #000) fixed; min-height:100vh; }
    
    :root{
      --blue:#3b82f6;
      --blue2:#2563eb;
      --bgCard1:#0b1a2d;
      --bgCard2:#07111f;
      --muted:#8aa0c7;
      --stroke:rgba(255,255,255,0.08);
      --max:430px;
    }

    .app-shell{
      width:100%; min-height:100vh; position:relative; overflow:hidden;
      display:flex; align-items:flex-start; justify-content:center;
    }

    #bgSlot{ position:absolute; inset:0; z-index:0; }
    .bg-layer{
      position:absolute; inset:0; background-size:cover; background-position:center;
      opacity:.3; transition: background-image 0.5s ease;
    }
    .bg-overlay{
      position:absolute; inset:0;
      background: radial-gradient(circle at 30% 10%, rgba(59,130,246,.22), transparent 55%),
                  linear-gradient(180deg, rgba(2,5,11,.58), rgba(2,5,11,.95));
      pointer-events:none;
    }

    .screen-enter{ animation: screenIn .25s ease-out forwards; }
    @keyframes screenIn{ from{ opacity:0; transform: translateY(15px);} to{ opacity:1; transform: translateY(0);} }

    .page-wrap{
      width:100%; max-width: var(--max); padding:18px 18px 140px; position:relative; z-index:5;
    }

    .logo-wrap{ display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:15px; }
    .logo-icon{
      width:32px; height:32px; background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-radius: 8px; display:flex; align-items:center; justify-content:center;
      box-shadow: 0 0 20px rgba(59,130,246,0.3); font-weight:900;
    }
    .logo-text{ font-size:20px; font-weight:900; color:#eaf2ff; }
    .logo-text span{ color: var(--blue); }

    .cp-h1{ font-size:28px; font-weight:900; color:#eaf2ff; margin:10px 0; line-height:1.2; }
    .cp-hint{ font-size:13px; color: var(--muted); font-weight:500; line-height:1.5; }
    .cp-label{ font-size:11px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color: var(--muted); margin-top:15px; }
    .tcenter{ text-align:center; }

    .cp-card{
      background: linear-gradient(180deg, var(--bgCard1), var(--bgCard2));
      border-radius:22px; padding:20px; margin-top:15px;
      border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .cp-input{
      width:100%; padding:12px; margin-top:10px; border-radius:14px;
      border:1px solid rgba(255,255,255,0.1); background:#071728; color:#fff; outline:none;
    }

    .btn-neon{
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color:#fff; font-weight:900; border:none; border-radius:50px;
      padding:15px; width:100%; margin-top:15px; cursor:pointer;
      box-shadow: 0 5px 15px rgba(59,130,246,0.3); transition: 0.2s;
    }
    .btn-neon:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

    .btn-secondary{
      background: rgba(255,255,255,0.05); color:#fff; border-radius:12px;
      padding:10px; border:1px solid rgba(255,255,255,0.1); cursor:pointer;
    }

    .bottom-nav{
      position:fixed; bottom:0; left:50%; transform: translateX(-50%);
      width:100%; max-width: var(--max); background: rgba(7, 20, 35, 0.95);
      backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1);
      padding: 10px 10px 25px; z-index:1000;
    }
    .bottom-nav-inner{ display:flex; justify-content: space-between; }
    .nav-btn{
      background:none; border:none; color: var(--muted); font-size:10px;
      display:flex; flex-direction:column; align-items:center; flex:1;
    }
    .nav-btn.active{ color: var(--blue); font-weight: 900; }
    .nav-btn span { font-size: 20px; margin-bottom: 4px; }

    .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .chip{
      padding:8px 15px; border-radius:20px; background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1); font-size:12px; cursor:pointer;
    }
    .chip.on{ background: var(--blue); border-color: var(--blue); color:#fff; }

    .photo-preview{
      width:100%; height:200px; border-radius:18px; background:#05101c;
      margin-top:15px; border:1px dashed var(--stroke); display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .photo-preview img{ width:100%; height:100%; object-fit:cover; }

    .orb{
      width:100%; height:180px; border-radius:22px;
      background: radial-gradient(circle at center, var(--blue2), #02050b);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      position:relative; margin-bottom:20px;
    }
    .orb h2 { font-size: 48px; font-weight: 900; }
    
    .confirm-box { background: rgba(59, 130, 246, 0.1); border-radius: 15px; padding: 15px; margin-top: 15px; display: none; }

    .cp-toast{
      position:fixed; top:20px; left:50%; transform: translateX(-50%) translateY(-100px);
      background:#0b1a2d; border:1px solid var(--blue); color:#fff;
      padding:12px 25px; border-radius:50px; font-weight:800; z-index:10000;
      transition: transform .3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    .cp-toast.show{ transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div id="root"></div>
  <div id="toastSlot"></div>

  <div id="modalBack" class="modal-back" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modalTitle">Info</h3>
      <div id="modalBody" class="cp-hint" style="margin: 15px 0"></div>
      <button class="btn-neon" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <script>
    /***********************
     * STATE & STORAGE
     ***********************/
    const KEY_PROFILE = "cp_profile_elite";
    const KEY_STEP = "cp_step_elite";
    const KEY_XP = "cp_xp_elite";
    const KEY_PLATES = "cp_plates_elite";

    let state = JSON.parse(localStorage.getItem(KEY_PROFILE)) || {
      nome: "", peso: "", objetivo: "Emagrecimento", nivel: "Iniciante", esportes: [], termo: false, avatar: ""
    };

    let currentScreen = "welcome";
    let activeTimer = null;
    let timerClock = null;
    let plateTemp = null;

    /***********************
     * UTILS
     ***********************/
    const showToast = (m) => {
      const s = document.getElementById("toastSlot");
      s.innerHTML = `<div class="cp-toast show">${m}</div>`;
      setTimeout(() => s.firstChild?.classList.remove("show"), 2000);
    };

    const save = () => localStorage.setItem(KEY_PROFILE, JSON.stringify(state));
    const getXP = () => Number(localStorage.getItem(KEY_XP) || "0");
    const addXP = (v) => localStorage.setItem(KEY_XP, String(getXP() + v));
    const setStep = (n) => localStorage.setItem(KEY_STEP, n);
    const getStep = () => Number(localStorage.getItem(KEY_STEP) || "0");

    function closeModal() { document.getElementById("modalBack").style.display = "none"; }
    function openModal(t, b) { 
      document.getElementById("modalTitle").innerText = t;
      document.getElementById("modalBody").innerHTML = b;
      document.getElementById("modalBack").style.display = "block";
    }

    /***********************
     * NAVIGATION
     ***********************/
    function goTo(scr) {
      if (getStep() < 3 && !["welcome", "acesso", "cadastro", "impacto"].includes(scr)) {
        showToast("Conclua seu cadastro!");
        return;
      }
      currentScreen = scr;
      render();
    }

    /***********************
     * RENDERING
     ***********************/
    function render() {
      const root = document.getElementById("root");
      const step = getStep();
      
      let nav = "";
      if(step >= 3) {
        const items = [
          {id:"prato", i:"🍽️", l:"Prato"},
          {id:"dieta", i:"🥗", l:"Dieta"},
          {id:"treino", i:"💪", l:"Treino"},
          {id:"progresso", i:"📈", l:"Progresso"},
          {id:"perfil", i:"👤", l:"Perfil"}
        ];
        nav = `<nav class="bottom-nav"><div class="bottom-nav-inner">
          ${items.map(t => `<button class="nav-btn ${currentScreen===t.id?'active':''}" onclick="goTo('${t.id}')"><span>${t.i}</span>${t.l}</button>`).join('')}
        </div></nav>`;
      }

      root.innerHTML = `
        <div class="app-shell">
          <div id="bgSlot"><div class="bg-layer" style="background-image:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1000')"></div><div class="bg-overlay"></div></div>
          <div class="page-wrap screen-enter" id="content"></div>
          ${nav}
        </div>
      `;

      const box = document.getElementById("content");
      if(currentScreen === "welcome") box.innerHTML = `
        <div class="logo-wrap" style="margin-top:60px"><div class="logo-icon">✓</div><div class="logo-text">Check<span>Prato</span></div></div>
        <div class="cp-card tcenter">
          <h1 class="cp-h1">Seu corpo, sua elite.</h1>
          <p class="cp-hint">Análise de pratos com IA e treinos personalizados em um só lugar.</p>
          <button class="btn-neon" onclick="setStep(1); goTo('acesso')">Começar Jornada</button>
        </div>`;
      
      else if(currentScreen === "acesso") box.innerHTML = `
        <h1 class="cp-h1 tcenter">Acesso</h1>
        <div class="cp-card">
          <input type="email" class="cp-input" placeholder="E-mail">
          <input type="password" class="cp-input" placeholder="Senha">
          <button class="btn-neon" onclick="setStep(2); goTo('cadastro')">Entrar</button>
          <p class="cp-hint tcenter" style="margin-top:15px">Ou use login social</p>
          <button class="btn-secondary" style="width:100%; margin-top:10px">G Entrar com Google</button>
        </div>`;

      else if(currentScreen === "cadastro") renderCadastro(box);
      else if(currentScreen === "impacto") box.innerHTML = `
        <div class="cp-card tcenter" style="margin-top:80px">
          <div style="font-size:60px">🏆</div>
          <h1 class="cp-h1">Você está dentro!</h1>
          <p class="cp-hint">Seu plano de Elite foi gerado. Vamos começar?</p>
          <button class="btn-neon" onclick="goTo('prato')">Bora!</button>
        </div>`;
      
      else if(currentScreen === "prato") renderPrato(box);
      else if(currentScreen === "dieta") renderDieta(box);
      else if(currentScreen === "treino") renderTreino(box);
      else if(currentScreen === "progresso") renderProgresso(box);
      else if(currentScreen === "perfil") renderPerfil(box);
    }

    /***********************
     * SCREEN RENDERERS
     ***********************/
    function renderCadastro(box) {
      const sports = ["Musculação", "Corrida", "CrossFit", "Yoga", "Futebol"];
      box.innerHTML = `
        <h1 class="cp-h1">Meu Perfil</h1>
        <div class="cp-card">
          <div class="tcenter">
            <div id="avatarCircle" style="width:80px; height:80px; border-radius:50%; background:#333; margin:0 auto; overflow:hidden; border:2px solid var(--blue)">
              ${state.avatar ? `<img src="${state.avatar}" style="width:100%;height:100%;object-fit:cover">` : ''}
            </div>
            <button class="btn-secondary" style="margin-top:10px; font-size:11px" onclick="document.getElementById('fileAv').click()">Mudar Foto</button>
            <input type="file" id="fileAv" hidden accept="image/*">
          </div>
          <input id="inNome" class="cp-input" placeholder="Nome Completo" value="${state.nome}">
          <input id="inPeso" class="cp-input" placeholder="Peso Atual (kg)" value="${state.peso}">
          <div class="cp-label">Objetivo</div>
          <select id="inObj" class="cp-input">
            <option ${state.objetivo=='Emagrecimento'?'selected':''}>Emagrecimento</option>
            <option ${state.objetivo=='Hipertrofia'?'selected':''}>Hipertrofia</option>
          </select>
          <div class="cp-label">Nível de Experiência</div>
          <select id="inNivel" class="cp-input">
            <option ${state.nivel=='Iniciante'?'selected':''}>Iniciante</option>
            <option ${state.nivel=='Médio'?'selected':''}>Médio</option>
            <option ${state.nivel=='Avançado'?'selected':''}>Avançado</option>
          </select>
          <div class="cp-label">Esportes Favoritos</div>
          <div class="chips">
            ${sports.map(s => `<div class="chip ${state.esportes.includes(s)?'on':''}" onclick="this.classList.toggle('on')">${s}</div>`).join('')}
          </div>
          <label style="display:flex; align-items:center; gap:10px; margin-top:20px; font-size:12px">
            <input type="checkbox" id="inTermo" ${state.termo?'checked':''}> Aceito os termos CheckPrato
          </label>
          <button class="btn-neon" onclick="finalizarCad()">Salvar Configurações</button>
        </div>`;

      document.getElementById("fileAv").onchange = (e) => {
        const r = new FileReader();
        r.onload = () => { state.avatar = r.result; save(); render(); };
        r.readAsDataURL(e.target.files[0]);
      };
    }

    function finalizarCad() {
      state.nome = document.getElementById("inNome").value;
      state.peso = document.getElementById("inPeso").value;
      state.termo = document.getElementById("inTermo").checked;
      state.esportes = Array.from(document.querySelectorAll(".chip.on")).map(c => c.innerText);
      if(!state.nome || !state.termo) return showToast("Preencha os dados obrigatórios!");
      save();
      setStep(3);
      goTo('impacto');
    }

    function renderPrato(box) {
      box.innerHTML = `
        <h1 class="cp-h1">Check Prato</h1>
        <div class="cp-card">
          <div class="photo-preview" id="pPlate">${plateTemp ? `<img src="${plateTemp}">` : '📸 Foto do Prato'}</div>
          <button class="btn-neon" onclick="document.getElementById('fPlate').click()">Tirar Foto</button>
          <input type="file" id="fPlate" hidden accept="image/*" capture="environment">
          <button class="btn-secondary" style="width:100%; margin-top:10px" onclick="analisarPrato()">Analisar com IA</button>
          
          <div id="plateInfo" class="confirm-box">
             <div style="display:flex; justify-content:space-between">
                <div><b style="color:var(--blue)">420 kcal</b><br><small>Calorias</small></div>
                <div><b>30g</b><br><small>Proteína</small></div>
                <div><b>45g</b><br><small>Carbos</small></div>
             </div>
             <button class="btn-neon" style="font-size:12px" onclick="confirmarPrato()">Confirmar e Salvar no Histórico</button>
          </div>
        </div>`;
      
      document.getElementById("fPlate").onchange = (e) => {
        const r = new FileReader();
        r.onload = () => { plateTemp = r.result; render(); };
        r.readAsDataURL(e.target.files[0]);
      };
    }

    function analisarPrato() {
      if(!plateTemp) return showToast("Adicione uma foto!");
      showToast("IA Processando...");
      setTimeout(() => document.getElementById("plateInfo").style.display = "block", 1500);
    }

    function confirmarPrato() {
      const plates = JSON.parse(localStorage.getItem(KEY_PLATES) || "[]");
      plates.unshift({ kcal: 420, date: new Date().toLocaleDateString() });
      localStorage.setItem(KEY_PLATES, JSON.stringify(plates));
      addXP(20);
      plateTemp = null;
      showToast("Prato salvo! +20 XP");
      goTo('progresso');
    }

    function renderDieta(box) {
      box.innerHTML = `
        <h1 class="cp-h1">Dieta Elite</h1>
        <div class="cp-card">
          <div class="cp-label">Sugestão de Hoje</div>
          <div style="margin-top:10px">
            <div class="day-card"><div class="day-title">Almoço</div><div class="cp-hint">150g Frango + 100g Arroz + Mix de Folhas</div></div>
            <div class="day-card"><div class="day-title">Lanche</div><div class="cp-hint">1 Iogurte Natural + 10g de Nozes</div></div>
          </div>
          <button class="btn-neon" onclick="openModal('Substituições', 'Você pode trocar o Frango por Peixe ou Omelete de 3 ovos.')">Ver Substituições</button>
        </div>`;
    }

    function renderTreino(box) {
      const minReq = state.nivel === "Iniciante" ? 1 : (state.nivel === "Médio" ? 3 : 5);
      box.innerHTML = `
        <h1 class="cp-h1">Treino</h1>
        <div class="cp-card">
          ${activeTimer ? `
            <div class="stat-box" style="border:2px solid var(--blue); margin-bottom:20px">
              <div class="stat-val" id="clock">00:00</div>
              <div class="stat-key">Tempo de Execução</div>
              <button class="btn-neon" id="btnFinish" disabled onclick="finalizarTreino()">Finalizar Exercício</button>
            </div>
          ` : ''}
          <div class="exercise">
            <div><div class="ex-name">Agachamento Livre</div><div class="ex-detail">Foco em amplitude • Mín ${minReq} min</div></div>
            <button class="btn-secondary" onclick="iniciarClock('Agachamento')">▶</button>
          </div>
          <div class="exercise">
            <div><div class="ex-name">Flexão de Braço</div><div class="ex-detail">3 séries até a falha</div></div>
            <button class="btn-secondary" onclick="iniciarClock('Flexão')">▶</button>
          </div>
        </div>`;
    }

    function iniciarClock(n) {
      if(activeTimer) return showToast("Termine o atual!");
      activeTimer = { name: n, start: Date.now() };
      render();
      const minReq = state.nivel === "Iniciante" ? 1 : (state.nivel === "Médio" ? 3 : 5);
      timerClock = setInterval(() => {
        const el = document.getElementById("clock");
        if(!el) return clearInterval(timerClock);
        const sec = Math.floor((Date.now() - activeTimer.start)/1000);
        const m = Math.floor(sec/60);
        const s = sec%60;
        el.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(m >= minReq) document.getElementById("btnFinish").disabled = false;
      }, 1000);
    }

    function finalizarTreino() {
      clearInterval(timerClock);
      activeTimer = null;
      addXP(30);
      showToast("Treino Concluído! +30 XP");
      render();
    }

    function renderProgresso(box) {
      const xp = getXP();
      const plates = JSON.parse(localStorage.getItem(KEY_PLATES) || "[]");
      box.innerHTML = `
        <h1 class="cp-h1">Progresso</h1>
        <div class="cp-card">
          <div class="orb">
            <h2 id="xpDisplay">${xp}</h2>
            <div class="stat-key">XP Total</div>
          </div>
          <div class="cp-label">Últimos Registros</div>
          <div style="margin-top:10px">
            ${plates.length ? plates.map(p => `
              <div class="mini-profile" style="margin-bottom:8px">
                <div class="mini-avatar">🍽️</div>
                <div><div class="mini-name">Prato de ${p.kcal} kcal</div><div class="mini-sub">Salvo em ${p.date}</div></div>
              </div>
            `).join('') : '<p class="cp-hint">Nenhum registro encontrado.</p>'}
          </div>
        </div>`;
    }

    function renderPerfil(box) {
      box.innerHTML = `
        <h1 class="cp-h1">Perfil</h1>
        <div class="cp-card">
          <div class="mini-profile">
            <div class="mini-avatar">${state.avatar ? `<img src="${state.avatar}">` : '👤'}</div>
            <div><div class="mini-name">${state.nome}</div><div class="mini-sub">${state.objetivo} • ${state.nivel}</div></div>
          </div>
          <button class="btn-neon" onclick="goTo('cadastro')">Editar Dados</button>
          <button class="btn-secondary" style="width:100%; margin-top:10px" onclick="localStorage.clear(); location.reload()">Resetar Aplicativo</button>
        </div>`;
    }

    // BOOT
    render();
  </script>
</body>
</html>
