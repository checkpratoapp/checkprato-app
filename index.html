<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckPrato</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

  <h1>CheckPrato 🍽️</h1>
  <p>Teste de salvamento no Firestore</p>

  <button onclick="salvarRefeicao()">Salvar refeição</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔥 COLE AQUI SUA CONFIG DO FIREBASE
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "XXXX",
      appId: "XXXX"
    };

    // Inicializa Firebase
    const app = initializeApp(firebaseConfig);

    // Inicializa Firestore
    const db = getFirestore(app);

    // Função para salvar dados
    async function salvarRefeicao() {
      try {
        await addDoc(collection(db, "refeicoes"), {
          nome: "Arroz e frango",
          calorias: 500,
          data: new Date()
        });

        alert("Refeição salva com sucesso!");
      } catch (erro) {
        console.error("Erro:", erro);
        alert("Erro ao salvar!");
      }
    }

    // Torna função global
    window.salvarRefeicao = salvarRefeicao;
  </script>

</body>
</html>
