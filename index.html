<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckPrato Elite — Dieta. Treino. Prato. Evolução.</title>
    <meta name="description" content="CheckPrato Elite — App de fitness com análise de prato, dietas personalizadas e treinos.">
    <meta name="theme-color" content="#02050b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
           CheckPrato Elite — Global Styles
           Design: Cyber-Fitness Dark Neon
           ============================================================ */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #02050b;
            color: #eaf2ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: radial-gradient(circle at 20% 0%, #0a1f38, #000) fixed;
            min-height: 100vh;
        }

        /* ============================================================
           CheckPrato Custom Utilities
           ============================================================ */

        .app-shell {
            width: 100%;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 20% 0%, #0a1f38, #000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen-enter {
            animation: screenIn 0.25s ease-out forwards;
        }

        @keyframes screenIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn-neon {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            padding: 14px 24px;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 4px 16px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        .btn-neon:hover, .btn-neon:active {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 6px 20px rgba(0,0,0,0.5);
            transform: translateY(-1px);
        }

        .btn-neon:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            color: #eaf2ff;
            font-weight: 700;
            border: 1.5px solid rgba(234, 242, 255, 0.3);
            border-radius: 50px;
            padding: 13px 24px;
            width: 100%;
            font-size: 15px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-outline:hover, .btn-outline:active {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #eaf2ff;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 14px;
            transition: all 0.2s ease;
            flex: 1;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* Cards */
        .cp-card {
            background: linear-gradient(180deg, #0b1a2d, #07111f);
            border-radius: 22px;
            padding: 18px;
            margin-top: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Input */
        .cp-input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 10px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #071728;
            color: #eaf2ff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .cp-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .cp-input::placeholder {
            color: #8aa0c7;
        }

        /* Label */
        .cp-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #8aa0c7;
            margin-top: 14px;
            margin-bottom: 4px;
        }

        /* Titles */
        .cp-h1 {
            font-size: 30px;
            font-weight: 900;
            color: #eaf2ff;
            margin: 8px 0 4px;
            line-height: 1.1;
        }

        .cp-hint {
            font-size: 13px;
            color: #8aa0c7;
            font-weight: 600;
            margin-bottom: 4px;
        }

        /* Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .stat-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .stat-key {
            font-size: 11px;
            font-weight: 700;
            color: #8aa0c7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 900;
            color: #3b82f6;
            line-height: 1.1;
            margin: 4px 0 2px;
        }

        .stat-sub {
            font-size: 10px;
            color: #8aa0c7;
            font-weight: 600;
        }

        /* Divider */
        .cp-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 16px 0;
        }

        /* List item */
        .cp-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .cp-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .cp-item-title {
            font-weight: 800;
            font-size: 14px;
            color: #eaf2ff;
        }

        .cp-item-sub {
            font-size: 12px;
            color: #8aa0c7;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Chip */
        .cp-chip {
            padding: 7px 14px;
            border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: #8aa0c7;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .cp-chip.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
        }

        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(7, 23, 40, 0.97);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 12px 20px;
            z-index: 100;
        }

        .bottom-nav-inner {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            flex: 1;
            border: none;
            padding: 8px 4px;
            border-radius: 14px;
            background: transparent;
            color: #8aa0c7;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-btn .nav-icon {
            font-size: 20px;
            line-height: 1;
        }

        .nav-btn.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
        }

        .nav-btn:hover {
            color: #60a5fa;
        }

        /* Toast */
        .cp-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #0b1a2d;
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #eaf2ff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .cp-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 2px; }

        /* Photo preview */
        .photo-preview {
            width: 100%;
            height: 190px;
            border-radius: 18px;
            background: #071728;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        /* Grid 2 cols */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Btn row */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        /* Neon text */
        .neon-text {
            color: #3b82f6;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* Splash dots */
        .splash-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .splash-dot.active {
            background: #3b82f6;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }

        /* Splash screen */
        .splash-screen {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .splash-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }

        .splash-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(2,5,11,0.3), rgba(2,5,11,0.85));
        }

        .splash-content {
            position: relative;
            z-index: 10;
            padding: 18px 18px 80px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .splash-hero-title {
            font-size: 38px;
            font-weight: 900;
            color: #eaf2ff;
            line-height: 1.15;
            text-align: center;
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 900;
            color: #eaf2ff;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #3b82f6;
        }

        /* Mini profile */
        .mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .mini-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            flex-shrink: 0;
        }

        .mini-name {
            font-weight: 800;
            font-size: 14px;
            color: #eaf2ff;
        }

        .mini-sub {
            font-size: 12px;
            color: #8aa0c7;
            font-weight: 600;
        }

        /* Page wrap */
        .page-wrap {
            width: 100%;
            max-width: 100%;
            padding: 18px 18px 130px;
            overflow-y: auto;
        }

        /* Neon badge */
        .neon-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 50px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #3b82f6;
            font-size: 12px;
            font-weight: 800;
        }

        /* Acesso header */
        .acesso-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .acesso-header p {
            color: #8aa0c7;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* Divider text */
        .divider-or {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        .divider-or span {
            color: #8aa0c7;
            font-size: 13px;
            font-weight: 700;
        }

        /* Termo box */
        .termo-box {
            width: 100%;
            height: 120px;
            background: #071728;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 12px;
            color: #8aa0c7;
            line-height: 1.5;
        }

        /* Checkbox wrap */
        .cp-checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            cursor: pointer;
        }

        .cp-checkbox-wrap input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .cp-checkbox-wrap input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Boas-vindas */
        .bv-quote {
            font-size: 18px;
            font-weight: 900;
            color: #eaf2ff;
            line-height: 1.4;
            margin: 16px 0;
        }

        .bv-sub {
            font-size: 14px;
            font-weight: 700;
            color: #8aa0c7;
            line-height: 1.4;
            margin: 12px 0;
        }

        .bv-muted {
            font-size: 12px;
            color: #8aa0c7;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Dieta meal */
        .dieta-meal {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .dieta-meal-title {
            font-weight: 800;
            font-size: 13px;
            color: #3b82f6;
            margin-bottom: 8px;
        }

        .dieta-meal-item {
            font-size: 13px;
            color: #eaf2ff;
            font-weight: 600;
            padding: 4px 0;
        }

        /* Treino day */
        .treino-day {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .treino-day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .treino-day-title {
            font-weight: 800;
            font-size: 13px;
            color: #3b82f6;
        }

        .treino-exercise {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .treino-exercise:last-child {
            border-bottom: none;
        }

        .treino-ex-name {
            font-size: 13px;
            color: #eaf2ff;
            font-weight: 700;
        }

        .treino-ex-detail {
            font-size: 12px;
            color: #8aa0c7;
            font-weight: 600;
        }

        /* XP bar */
        .xp-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            overflow: hidden;
            margin-top: 12px;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 50px;
            transition: width 0.3s ease;
        }

        /* Evolution stat */
        .evo-stat {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .evo-stat-val {
            font-size: 22px;
            font-weight: 900;
            color: #3b82f6;
            line-height: 1.1;
            margin: 4px 0 2px;
        }

        .evo-stat-label {
            font-size: 10px;
            color: #8aa0c7;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Hidden input */
        input[type="file"] {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .splash-hero-title {
                font-size: 32px;
            }

            .cp-h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

        function dbInit() {
            const db = getDB();
            if (!db.user) db.user = {};
            if (!db.user.sports) db.user.sports = [];
            if (!db.pratos) db.pratos = [];
            if (!db.dietasSalvas) db.dietasSalvas = [];
            if (!db.pontos) db.pontos = { xp: 0, pratos: 0, treinos: 0 };
            setDB(db);
            return db;

            ];
            return `

                            <button class="nav-btn ${currentScreen === n.id ? "active" : ""}" onclick="goTo('${n.id}')">

        function attachEventListeners() {
            // Splash dots
            document.querySelectorAll(".splash-dot").forEach(dot => {
                dot.addEventListener("click", () => {
                    const index = parseInt(dot.dataset.dot);
                    // Update slide logic here if needed
                });
            });

            // Sport chips
            document.querySelectorAll(".cp-chip").forEach(chip => {
                chip.addEventListener("click", () => {
                    chip.classList.toggle("active");
                });
            });

            // Termo scroll
            const termoBox = document.querySelector(".termo-box");
            const termoCheck = document.getElementById("termo-check");
            if (termoBox && termoCheck) {
                termoBox.addEventListener("scroll", () => {
                    if (termoBox.scrollTop + termoBox.clientHeight >= termoBox.scrollHeight - 10) {
                        termoCheck.disabled = false;
                    }
                });
            }
        }

        render();
