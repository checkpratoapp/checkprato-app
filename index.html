<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CheckPrato Elite — Dieta. Treino. Prato. Evolução.</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #02050b; color: #eaf2ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        body { background: radial-gradient(circle at 20% 0%, #0a1f38, #000) fixed; min-height: 100vh; }

        /* evita flicker em alguns celulares ao trocar conteúdo */
        body, .app-shell, .page-wrap { -webkit-font-smoothing: antialiased; -webkit-transform: translateZ(0); transform: translateZ(0); }

        .app-shell { width: 100%; min-height: 100vh; position: relative; overflow: hidden; background: radial-gradient(circle at 20% 0%, #0a1f38, #000); display: flex; align-items: center; justify-content: center; }
        .screen-enter { animation: screenIn 0.25s ease-out forwards; }
        @keyframes screenIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .btn-neon { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-weight: 900; border: none; border-radius: 50px; padding: 14px 24px; width: 100%; font-size: 16px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 4px 16px rgba(0,0,0,0.4); transition: all 0.2s ease; cursor: pointer; }
        .btn-neon:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 6px 20px rgba(0,0,0,0.5); transform: translateY(-1px); }

        .btn-outline { background: transparent; color: #eaf2ff; font-weight: 700; border: 1.5px solid rgba(234, 242, 255, 0.3); border-radius: 50px; padding: 13px 24px; width: 100%; font-size: 15px; transition: all 0.2s ease; cursor: pointer; }
        .btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }

        .btn-secondary { background: rgba(255,255,255,0.06); color: #eaf2ff; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 18px; font-size: 14px; transition: all 0.2s ease; flex: 1; cursor: pointer; }
        .btn-secondary:hover { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }

        .cp-card { background: linear-gradient(180deg, #0b1a2d, #07111f); border-radius: 22px; padding: 18px; margin-top: 14px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .cp-input { width: 100%; padding: 12px 14px; margin-top: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: #071728; color: #eaf2ff; font-size: 14px; outline: none; }
        .cp-input:focus { border-color: rgba(59, 130, 246, 0.5); }

        .cp-label { font-size: 11px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; color: #8aa0c7; margin-top: 14px; margin-bottom: 4px; }
        .cp-h1 { font-size: 30px; font-weight: 900; color: #eaf2ff; margin: 8px 0 4px; }
        .cp-hint { font-size: 13px; color: #8aa0c7; font-weight: 600; margin-bottom: 4px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 12px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 900; color: #3b82f6; line-height: 1.1; margin: 4px 0 2px; }
        .stat-key { font-size: 11px; font-weight: 700; color: #8aa0c7; text-transform: uppercase; }

        .cp-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); margin: 16px 0; }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(7, 23, 40, 0.97); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); padding: 8px 12px 20px; z-index: 100; }
        .bottom-nav-inner { display: flex; gap: 4px; }
        .nav-btn { flex: 1; border: none; padding: 8px 4px; border-radius: 14px; background: transparent; color: #8aa0c7; font-weight: 700; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; cursor: pointer; }
        .nav-btn .nav-icon { font-size: 20px; }
        .nav-btn.active { color: #3b82f6; background: rgba(59, 130, 246, 0.08); }

        .cp-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #0b1a2d; border: 1px solid rgba(59, 130, 246, 0.4); color: #eaf2ff; padding: 12px 24px; border-radius: 50px; font-weight: 700; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .cp-toast.show { transform: translateX(-50%) translateY(0); }

        .page-wrap { width: 100%; max-width: 430px; padding: 18px 18px 130px; overflow-y: auto; }
        .logo-wrap { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .logo-text { font-size: 20px; font-weight: 900; color: #eaf2ff; }
        .logo-text span { color: #3b82f6; }

        .mini-profile { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 12px; }
        .mini-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; flex-shrink: 0; font-size: 20px; overflow:hidden; }
        .mini-avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
        .mini-name { font-weight: 800; font-size: 14px; color: #eaf2ff; }
        .mini-sub { font-size: 12px; color: #8aa0c7; font-weight: 600; }

        .neon-text { color: #3b82f6; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-row { display: flex; gap: 10px; margin-top: 12px; }

        .splash-screen { position: relative; width: 100%; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; max-width: 430px; }
        .splash-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
        .splash-overlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(2,5,11,0.3), rgba(2,5,11,0.85)); }
        .splash-content { position: relative; z-index: 10; padding: 18px 18px 80px; display: flex; flex-direction: column; height: 100vh; }

        .splash-hero-title { font-size: 38px; font-weight: 900; color: #eaf2ff; line-height: 1.15; text-align: center; }

        .dieta-meal { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
        .dieta-meal-title { font-weight: 800; font-size: 13px; color: #3b82f6; margin-bottom: 8px; }
        .dieta-meal-item { font-size: 13px; color: #eaf2ff; font-weight: 600; padding: 4px 0; }

        .treino-day { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
        .treino-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .treino-day-title { font-weight: 800; font-size: 13px; color: #3b82f6; }
        .treino-exercise { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .treino-exercise:last-child { border-bottom: none; }
        .treino-ex-name { font-size: 13px; color: #eaf2ff; font-weight: 700; }
        .treino-ex-detail { font-size: 12px; color: #8aa0c7; font-weight: 600; }

        .photo-preview { width: 100%; height: 190px; border-radius: 18px; background: #071728; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-top: 10px; color: rgba(234,242,255,0.7); font-weight: 800; }
        .photo-preview img{ width:100%; height:100%; object-fit:cover; display:block; }

        .divider-or { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
        .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); }
        .divider-or span { color: #8aa0c7; font-size: 13px; font-weight: 700; }

        .acesso-header { text-align: center; margin-bottom: 24px; }
        .acesso-header p { color: #8aa0c7; font-size: 14px; font-weight: 600; margin-top: 8px; }

        .bv-quote { font-size: 18px; font-weight: 900; color: #eaf2ff; line-height: 1.4; margin: 16px 0; }
        .bv-sub { font-size: 14px; font-weight: 700; color: #8aa0c7; line-height: 1.4; margin: 12px 0; }

        .confirm-box{ margin-top: 12px; padding: 12px; border-radius: 16px; border:1px solid rgba(59,130,246,0.25); background: rgba(59,130,246,0.08); }
        .confirm-title{ font-weight: 900; margin-bottom: 8px; color:#eaf2ff; }
        .confirm-actions{ display:flex; gap:10px; margin-top:10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        /***********************
         * CONFIG
         ***********************/
        const HERO_IMG = "https://d2xsxph8kpxj0f.cloudfront.net/310519663388243015/7hwT4Rcpzmt9PDwsiCfqK7/checkprato-hero-PJzdhsav9GuvFxECAtVKXF.webp";

        // ✅ IA real (segura) precisa de endpoint (Firebase Function / Cloud Run).
        // Coloque aqui a URL do seu endpoint quando tiver (sem chave no HTML).
        const AI_ENDPOINT = ""; // ex: "https://us-central1-SEU-PROJETO.cloudfunctions.net/analyzePlate"

        const BV_FRASES = [
            ["Você não precisa de motivação. Precisa de direção.", "Pequenas escolhas hoje. Uma versão absurda de você amanhã."],
            ["Disciplina é a ponte entre objetivos e conquistas.", "Cada rep conta. Cada refeição importa. Cada dia é uma escolha."],
            ["Não existe atalho para onde vale a pena chegar.", "Consistência supera intensidade. Todo. Santo. Dia."],
        ];

        const DIETAS_TIPOS = {
            emagrecimento: [
                { titulo: "☀️ Café da manhã", refeicoes: ["2 ovos mexidos", "1 fatia de pão integral", "Café sem açúcar", "1 fruta"] },
                { titulo: "🥗 Almoço", refeicoes: ["Frango grelhado 150g", "Arroz integral 4 col.", "Feijão 2 col.", "Salada verde"] },
                { titulo: "🍎 Lanche", refeicoes: ["Iogurte grego sem açúcar", "Castanhas 30g"] },
                { titulo: "🌙 Jantar", refeicoes: ["Omelete de 3 ovos", "Legumes refogados", "Chá sem açúcar"] },
            ],
            hipertrofia: [
                { titulo: "☀️ Café da manhã", refeicoes: ["Aveia 80g", "3 ovos inteiros", "Leite integral 200ml", "Banana"] },
                { titulo: "🥗 Almoço", refeicoes: ["Frango 200g", "Arroz branco 6 col.", "Feijão 3 col.", "Batata doce 150g"] },
                { titulo: "🍎 Pré-treino", refeicoes: ["Whey protein 1 dose", "Banana 1 unidade"] },
                { titulo: "🌙 Pós-treino", refeicoes: ["Carne vermelha 200g", "Macarrão integral 100g", "Brócolis"] },
            ],
            lowcarb: [
                { titulo: "☀️ Café da manhã", refeicoes: ["Ovos mexidos com queijo", "Abacate 1/2", "Café com leite"] },
                { titulo: "🥗 Almoço", refeicoes: ["Salmão grelhado 150g", "Salada verde com azeite", "Brócolis"] },
                { titulo: "🍎 Lanche", refeicoes: ["Castanhas mistas 40g", "Queijo cottage 100g"] },
                { titulo: "🌙 Jantar", refeicoes: ["Frango assado 150g", "Couve-flor gratinada", "Chá verde"] },
            ],
        };

        const TREINOS_TIPOS = {
            Musculação: [
                { dia: "Segunda — Peito + Tríceps", exercicios: [{ nome: "Supino reto", series: "4x10" }, { nome: "Crucifixo", series: "3x12" }, { nome: "Tríceps corda", series: "4x12" }] },
                { dia: "Terça — Costas + Bíceps", exercicios: [{ nome: "Puxada frontal", series: "4x10" }, { nome: "Remada curvada", series: "4x10" }, { nome: "Rosca direta", series: "3x12" }] },
                { dia: "Quarta — Pernas", exercicios: [{ nome: "Agachamento livre", series: "4x10" }, { nome: "Leg press", series: "4x12" }, { nome: "Cadeira extensora", series: "3x15" }] },
                { dia: "Quinta — Ombros", exercicios: [{ nome: "Desenvolvimento", series: "4x10" }, { nome: "Elevação lateral", series: "4x12" }] },
                { dia: "Sexta — Full body", exercicios: [{ nome: "Agachamento goblet", series: "3x15" }, { nome: "Flexão", series: "3x15" }, { nome: "Prancha", series: "3x40s" }] },
            ],
            Corrida: [
                { dia: "Segunda — Leve", exercicios: [{ nome: "Aquecimento", series: "5min" }, { nome: "Corrida contínua", series: "30min" }, { nome: "Alongamento", series: "10min" }] },
                { dia: "Quarta — Intervalado", exercicios: [{ nome: "Aquecimento", series: "5min" }, { nome: "Sprint 30s + caminhada 1min", series: "8x" }] },
                { dia: "Sexta — Longa", exercicios: [{ nome: "Corrida contínua", series: "45min" }, { nome: "Alongamento completo", series: "15min" }] },
            ],
            CrossFit: [
                { dia: "Segunda — Força", exercicios: [{ nome: "Agachamento frontal", series: "5x5" }, { nome: "Supino", series: "5x5" }] },
                { dia: "Quarta — WOD", exercicios: [{ nome: "Burpees", series: "20min AMRAP" }, { nome: "Box jump", series: "20min AMRAP" }] },
                { dia: "Sexta — Metcon", exercicios: [{ nome: "Kettlebell swing", series: "15min" }, { nome: "Wall ball", series: "15min" }] },
            ],
        };

        /***********************
         * STORAGE (etapas reais)
         ***********************/
        const KEY_PROFILE = "cp_profile_v1";
        const KEY_ONBOARD = "cp_onboard_done_v1";
        const KEY_PLATE_LAST = "cp_plate_last_v1";
        const KEY_PLATES = "cp_plates_v1";       // histórico de pratos confirmados
        const KEY_TRAIN_DONE = "cp_train_done_v1"; // dias concluídos
        const KEY_XP = "cp_xp_v1";

        function safeJsonParse(s, fallback){
            try{ return JSON.parse(s); }catch{ return fallback; }
        }
        function loadProfile(){ return safeJsonParse(localStorage.getItem(KEY_PROFILE) || "null", null); }
        function saveProfile(p){ localStorage.setItem(KEY_PROFILE, JSON.stringify(p)); }
        function isOnboardDone(){ return localStorage.getItem(KEY_ONBOARD) === "1"; }
        function setOnboardDone(v){ localStorage.setItem(KEY_ONBOARD, v ? "1" : "0"); }

        function loadPlates(){ return safeJsonParse(localStorage.getItem(KEY_PLATES) || "[]", []); }
        function savePlates(arr){ localStorage.setItem(KEY_PLATES, JSON.stringify(arr)); }

        function loadTrainDone(){ return safeJsonParse(localStorage.getItem(KEY_TRAIN_DONE) || "[]", []); }
        function saveTrainDone(arr){ localStorage.setItem(KEY_TRAIN_DONE, JSON.stringify(arr)); }

        function getXP(){ return Number(localStorage.getItem(KEY_XP) || "0"); }
        function addXP(v){ localStorage.setItem(KEY_XP, String(getXP() + Number(v||0))); }

        /***********************
         * STATE
         ***********************/
        let currentScreen = "splash";
        let lastScreen = "";
        let toastMsg = "";
        let toastShow = false;

        let selectedDietType = "emagrecimento";
        let selectedWorkoutType = "Musculação";

        // prato / imagem
        let plateDataUrl = localStorage.getItem(KEY_PLATE_LAST) || "";
        let plateAIResult = null; // {description, calories, protein, carbs, fat, items[]}
        let plateConfirmText = "";

        /***********************
         * TOAST / NAV
         ***********************/
        function showToast(msg) {
            toastMsg = msg;
            toastShow = true;
            renderToast();
            setTimeout(() => {
                toastShow = false;
                renderToast();
            }, 2400);
        }

        function canAccess(screen){
            // etapas permitidas antes do cadastro finalizado
            const allowedBefore = new Set(["splash","acesso","cadastro","boasvindas"]);
            if(isOnboardDone()) return true;
            return allowedBefore.has(screen);
        }

        function goTo(screen) {
            if(!canAccess(screen)){
                showToast("Conclua o cadastro antes de acessar as abas.");
                currentScreen = "cadastro";
                render();
                return;
            }
            currentScreen = screen;
            render();
        }

        /***********************
         * MOUNT (corrige flicker)
         * - monta a casca 1x
         ***********************/
        function mountOnce(){
            const root = document.getElementById("root");
            root.innerHTML = `
                <div class="app-shell">
                    <div id="screenSlot"></div>
                    <div id="navSlot"></div>
                    <div id="toastSlot"></div>
                </div>
            `;
        }

        function render(){
            // anima só quando muda de tela (evita piscar)
            const animate = (currentScreen !== lastScreen);
            lastScreen = currentScreen;

            const screenSlot = document.getElementById("screenSlot");
            if(!screenSlot) return;

            let content = "";
            if (currentScreen === "splash") content = renderSplash(animate);
            else if (currentScreen === "acesso") content = renderAcesso(animate);
            else if (currentScreen === "cadastro") content = renderCadastro(animate);
            else if (currentScreen === "boasvindas") content = renderBoasVindas(animate);
            else if (currentScreen === "dashboard") content = renderDashboard(animate);
            else if (currentScreen === "prato") content = renderPrato(animate);
            else if (currentScreen === "treino") content = renderTreino(animate);
            else if (currentScreen === "saude") content = renderSaude(animate);
            else if (currentScreen === "dieta") content = renderDieta(animate);

            screenSlot.innerHTML = content;

            renderBottomNav();
            renderToast();

            // re-wire do prato (inputs file)
            if(currentScreen === "prato"){
                wirePlateInputs();
                renderPlatePreview();
            }
        }

        function renderBottomNav(){
            const navSlot = document.getElementById("navSlot");
            if(!navSlot) return;

            // não mostra nav no splash e nem antes do cadastro finalizado
            if(currentScreen === "splash" || !isOnboardDone()){
                navSlot.innerHTML = "";
                return;
            }

            const items = [
                { id: "dashboard", icon: "📊", label: "Dashboard" },
                { id: "prato", icon: "🍽️", label: "Prato" },
                { id: "treino", icon: "💪", label: "Treino" },
                { id: "saude", icon: "❤️", label: "Saúde" },
                { id: "dieta", icon: "🥗", label: "Dieta" },
            ];

            navSlot.innerHTML = `
                <nav class="bottom-nav">
                    <div class="bottom-nav-inner">
                        ${items.map(n => `
                            <button class="nav-btn ${currentScreen === n.id ? "active" : ""}" onclick="goTo('${n.id}')">
                                <span class="nav-icon">${n.icon}</span>
                                ${n.label}
                            </button>
                        `).join("")}
                    </div>
                </nav>
            `;
        }

        function renderToast(){
            const toastSlot = document.getElementById("toastSlot");
            if(!toastSlot) return;
            toastSlot.innerHTML = `<div class="cp-toast ${toastShow ? "show" : ""}">${escapeHtml(toastMsg)}</div>`;
        }

        /***********************
         * UI HELPERS
         ***********************/
        function escapeHtml(s){
            return String(s ?? "").replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
        }

        function getProfileDisplay(){
            const p = loadProfile();
            const fullName = p ? `${p.nome || ""} ${p.sobrenome || ""}`.trim() : "";
            const name = fullName || "Visitante";
            const sub = isOnboardDone() ? "Conta ativa" : "Cadastro pendente";
            const avatar = p?.avatarDataUrl || "";
            return { name, sub, avatar };
        }

        /***********************
         * SCREENS (mantendo sua lógica)
         ***********************/
        function renderSplash(animate) {
            return `
                <div class="splash-screen ${animate ? "screen-enter" : ""}">
                    <div class="splash-bg" style="background-image: url('${HERO_IMG}')"></div>
                    <div class="splash-overlay"></div>
                    <div class="splash-content">
                        <div class="logo-wrap">
                            <div class="logo-icon">✓</div>
                            <div class="logo-text">Check<span>Prato</span></div>
                        </div>
                        <div style="flex: 1;"></div>
                        <div style="text-align: center; margin-bottom: 12px;">
                            <h1 class="splash-hero-title">Seu corpo<br>reflete<br><span class='neon-text'>suas escolhas.</span></h1>
                            <p style="color: rgba(234,242,255,0.85); font-weight: 700; font-size: 15px; margin-top: 14px; line-height: 1.5;">Pequenas decisões hoje criam grandes transformações amanhã.</p>
                        </div>
                        <button class="btn-neon" onclick="goTo('acesso')">Começar agora</button>
                        <button class="btn-outline" style="margin-top: 12px;" onclick="goTo('acesso')">Entrar / Criar conta</button>
                    </div>
                </div>
            `;
        }

        function renderAcesso(animate) {
            return `
                <div class="page-wrap ${animate ? "screen-enter" : ""}">
                    <div class="acesso-header">
                        <div class="logo-wrap">
                            <div class="logo-icon">✓</div>
                            <div class="logo-text">Check<span>Prato</span></div>
                        </div>
                        <p>Bem-vindo de volta</p>
                    </div>
                    <div class="cp-card">
                        <button class="btn-neon" onclick="showToast('Login Google: configurar via Firebase (em breve)')">G Entrar com Google</button>
                        <div class="divider-or"><span>ou</span></div>
                        <input id="loginEmail" class="cp-input" placeholder="Email" type="email">
                        <input id="loginPass" class="cp-input" placeholder="Senha" type="password" style="margin-top: 10px;">
                        <button class="btn-neon" style="margin-top: 14px;" onclick="startAsGuest()">Entrar (modo local)</button>
                        <button class="btn-outline" style="margin-top: 10px;" onclick="goTo('cadastro')">Criar conta</button>
                    </div>
                </div>
            `;
        }

        function renderCadastro(animate) {
            const p = loadProfile() || {};
            return `
                <div class="page-wrap ${animate ? "screen-enter" : ""}">
                    <div class="cp-h1">Cadastro</div>
                    <div class="cp-hint">Conclua o cadastro para liberar as abas do app.</div>

                    <div class="cp-card">
                        <div class="cp-label">Foto do perfil</div>
                        <div class="btn-row">

        function renderTreino(animate) {
            const { name, sub, avatar } = getProfileDisplay();
            const treino = TREINOS_TIPOS[selectedWorkoutType] || TREINOS_TIPOS["Musculação"];
            return `

                            <div class="mini-name">${escapeHtml(name)}</div>

        function renderDieta(animate) {
            const { name, sub, avatar } = getProfileDisplay();
            const dieta = DIETAS_TIPOS[selectedDietType] || DIETAS_TIPOS["emagrecimento"];
            return `
                <div class="page-wrap ${animate ? "screen-enter" : ""}">

                        <div class="mini-avatar">${avatar ? `<img src="${escapeHtml(avatar)}" alt="avatar">` : "🥗"}</div>
                        <div>
                            <div class="mini-name">${escapeHtml(name)}</div>
                            <div class="mini-sub">Dieta • selecione e gere</div>

                    </div>

                    <div class="cp-h1">Dietas</div>

                    <div class="cp-card">
                        <div class="cp-label">Tipo de Dieta</div>
                        <select class="cp-input" onchange="selectedDietType = this.value; render();">
                            <option value="emagrecimento" ${selectedDietType==="emagrecimento"?"selected":""}>Emagrecimento</option>

                            <option value="lowcarb" ${selectedDietType==="lowcarb"?"selected":""}>Low Carb</option>

                        <button class="btn-neon" style="margin-top: 14px;" onclick="showToast('Dieta gerada!')">🥗 Gerar dieta</button>

                        <div class="cp-divider"></div>
                        <div class="cp-label">Refeições</div>

                        ${dieta.map(m => `

                                ${m.refeicoes.map(r => `<div class="dieta-meal-item">• ${escapeHtml(r)}</div>`).join("")}

        /***********************
         * ACTIONS (etapas)
         ***********************/
        function startAsGuest(){
            // entra no fluxo de cadastro (obrigatório)
            showToast("Modo local: conclua o cadastro.");
            goTo("cadastro");
        }

        function saveCadastro(){
            const nome = document.getElementById("cadNome")?.value?.trim() || "";
            const sobrenome = document.getElementById("cadSobrenome")?.value?.trim() || "";
            const peso = document.getElementById("cadPeso")?.value?.trim() || "";
            const altura = document.getElementById("cadAltura")?.value?.trim() || "";
            const sexo = document.getElementById("cadSexo")?.value || "";
            const objetivo = document.getElementById("cadObjetivo")?.value || "";

            if(!nome || !peso || !altura || sexo==="Sexo" || objetivo==="Objetivo"){
                showToast("Preencha nome, peso, altura, sexo e objetivo.");
                return;
            }

            const existing = loadProfile() || {};
            const profile = {
                ...existing,
                nome, sobrenome, peso, altura, sexo, objetivo,
                updatedAt: Date.now()
            };
            saveProfile(profile);

            showToast("Cadastro salvo ✅");
            goTo("boasvindas");
        }

        function finishOnboarding(){
            setOnboardDone(true);
            addXP(50);
            showToast("Bem-vindo! +50 XP");
            goTo("dashboard");
        }

        function resetAll(){
            if(!confirm("Tem certeza? Isso apaga dados locais do app.")) return;
            localStorage.removeItem(KEY_PROFILE);
            localStorage.removeItem(KEY_ONBOARD);
            localStorage.removeItem(KEY_PLATE_LAST);
            localStorage.removeItem(KEY_PLATES);
            localStorage.removeItem(KEY_TRAIN_DONE);
            localStorage.removeItem(KEY_XP);
            plateDataUrl = "";
            plateAIResult = null;
            plateConfirmText = "";
            showToast("Dados apagados.");
            currentScreen = "acesso";
            render();
        }

        /***********************
         * AVATAR
         ***********************/
        function pickAvatar(){
            const inp = document.getElementById("avatarFile");
            if(!inp){
                // a tela pode não ter o input renderizado ainda (caso não esteja no cadastro)
                showToast("Abra a tela de Cadastro para escolher foto.");
                return;
            }
            inp.onchange = async () => {
                const file = inp.files && inp.files[0];
                if(!file) return;
                const dataUrl = await readFileAsDataUrl(file);
                const p = loadProfile() || {};
                p.avatarDataUrl = dataUrl;
                saveProfile(p);
                showToast("Foto salva ✅");
                render();
            };
            inp.click();
        }

        function removeAvatar(){
            const p = loadProfile() || {};
            delete p.avatarDataUrl;
            saveProfile(p);
            showToast("Foto removida.");
            render();
        }

        function readFileAsDataUrl(file){
            return new Promise((resolve, reject)=>{
                const reader = new FileReader();
                reader.onload = ()=> resolve(String(reader.result || ""));
                reader.onerror = ()=> reject(new Error("Falha ao ler arquivo"));
                reader.readAsDataURL(file);
            });
        }

        /***********************
         * PRATO: foto + IA (sem demo)
         ***********************/
        function wirePlateInputs(){
            const cam = document.getElementById("fileCam");
            const gal = document.getElementById("fileGal");
            if(cam){
                cam.onchange = async () => {
                    const f = cam.files && cam.files[0];
                    if(!f) return;
                    plateDataUrl = await readFileAsDataUrl(f);
                    localStorage.setItem(KEY_PLATE_LAST, plateDataUrl);
                    plateAIResult = null;
                    plateConfirmText = "";
                    renderPlatePreview();
                    clearMacros();
                    hideConfirmBox();
                    showToast("Foto carregada ✅");
                };
            }
            if(gal){
                gal.onchange = async () => {
                    const f = gal.files && gal.files[0];
                    if(!f) return;
                    plateDataUrl = await readFileAsDataUrl(f);
                    localStorage.setItem(KEY_PLATE_LAST, plateDataUrl);
                    plateAIResult = null;
                    plateConfirmText = "";
                    renderPlatePreview();
                    clearMacros();
                    hideConfirmBox();
                    showToast("Foto carregada ✅");
                };
            }
        }

        function renderPlatePreview(){
            const box = document.getElementById("photoPreview");
            if(!box) return;
            if(!plateDataUrl){
                box.innerHTML = "📸 Envie uma foto para analisar";
                return;
            }
            box.innerHTML = `<img src="${escapeHtml(plateDataUrl)}" alt="prato">`;
        }

        function openCamera(){
            const cam = document.getElementById("fileCam");
            if(cam) cam.click();
        }
        function openGallery(){
            const gal = document.getElementById("fileGal");
            if(gal) gal.click();
        }

        function clearMacros(){
            const ids = ["kcalBox","protBox","carbBox","fatBox"];
            ids.forEach(id=>{
                const el = document.getElementById(id);
                if(el) el.textContent = "—";
            });
        }
        function fillMacros(res){
            const kcal = document.getElementById("kcalBox");
            const prot = document.getElementById("protBox");
            const carb = document.getElementById("carbBox");
            const fat  = document.getElementById("fatBox");
            if(kcal) kcal.textContent = (res?.calories ? String(res.calories) : "—");
            if(prot) prot.textContent = (res?.protein ? `${res.protein}g` : "—");
            if(carb) carb.textContent = (res?.carbs ? `${res.carbs}g` : "—");
            if(fat)  fat.textContent  = (res?.fat ? `${res.fat}g` : "—");
        }
        function showConfirmBox(text){
            const box = document.getElementById("plateConfirm");
            const ta = document.getElementById("plateConfirmText");
            if(box) box.style.display = "block";
            if(ta) ta.value = text || "";
        }
        function hideConfirmBox(){
            const box = document.getElementById("plateConfirm");
            if(box) box.style.display = "none";
        }

        async function analisarPrato(){
            if(!plateDataUrl){
                showToast("Envie uma foto primeiro.");
                return;
            }

            // sem inventar resultado:
            if(!AI_ENDPOINT){
                showToast("IA não configurada (falta endpoint seguro).");
                return;
            }

            showToast("Analisando com IA...");
            try{
                const base64 = plateDataUrl.split(",")[1] || "";
                const desc = document.getElementById("plateDesc")?.value?.trim() || "";

                const res = await fetch(AI_ENDPOINT, {
                    method:"POST",
                    headers: { "Content-Type":"application/json" },
                    body: JSON.stringify({ imageBase64: base64, hint: desc })
                });

                if(!res.ok){
                    const t = await res.text().catch(()=> "");
                    throw new Error(t || `HTTP ${res.status}`);
                }

                const data = await res.json();
                // esperado: { description, calories, protein, carbs, fat, items[] }
                plateAIResult = data;

                fillMacros(plateAIResult);

                const confirmText =
                    `IA sugeriu:\n` +
                    `${data.description || "Sem descrição"}\n\n` +
                    `Calorias: ${data.calories ?? "—"}\n` +
                    `Proteína: ${data.protein ?? "—"}g\n` +
                    `Carboidrato: ${data.carbs ?? "—"}g\n` +
                    `Gordura: ${data.fat ?? "—"}g\n`;

                plateConfirmText = confirmText;
                showConfirmBox(confirmText);
                showToast("Resultado pronto. Confirme ✅");

            }catch(e){
                showToast("Erro na IA: " + (e?.message || e));
            }
        }

        function refazerAnalise(){
            plateAIResult = null;
            plateConfirmText = "";
            hideConfirmBox();
            clearMacros();
            showToast("Refaça a análise quando quiser.");
        }

        function confirmarPrato(){
            const ta = document.getElementById("plateConfirmText");
            const text = ta ? ta.value.trim() : plateConfirmText.trim();
            if(!text){
                showToast("Nada para confirmar.");
                return;
            }

            const entry = {
                id: "plate_" + Date.now(),
                createdAt: Date.now(),
                note: text,
                calories: plateAIResult?.calories ?? null,
                protein: plateAIResult?.protein ?? null,
                carbs: plateAIResult?.carbs ?? null,
                fat: plateAIResult?.fat ?? null
            };

            const arr = loadPlates();
            arr.unshift(entry);
            savePlates(arr);

            addXP(10);
            showToast("Prato salvo! +10 XP");
            hideConfirmBox();

            // opcional: volta pro dashboard
            goTo("dashboard");
        }

        /***********************
         * TREINO: marca dia + youtube
         ***********************/
        function marcarDiaTreino(label){
            const arr = loadTrainDone();
            const dayId = `${selectedWorkoutType}::${label}`;
            if(arr.includes(dayId)){
                showToast("Dia já marcado.");
                return;
            }
            arr.push(dayId);
            saveTrainDone(arr);
            addXP(20);
            showToast("Dia concluído! +20 XP");
            render();
        }

        function openYouTube(query){
            const q = encodeURIComponent(query + " como fazer");
            window.open("https://www.youtube.com/results?search_query=" + q, "_blank");
        }

        /***********************
         * BOOT
         ***********************/
        function boot(){
            mountOnce();

            // etapa inicial
            if(isOnboardDone()){
                currentScreen = "dashboard";
            }else{
                // se tiver perfil salvo mas não finalizado, manda pro cadastro
                currentScreen = loadProfile() ? "cadastro" : "splash";
            }

            render();
        }

        boot();
    </script>
</body>
