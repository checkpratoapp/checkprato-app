    function readFileAsDataUrl(file){
      return new Promise((resolve,reject)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result||""));
        r.onerror = ()=> reject(new Error("Falha ao ler arquivo"));
        r.readAsDataURL(file);
      });
    }

      const p = loadProfile();

    function getBgForScreen(screen){ return BG_BY_SCREEN[screen] || HERO_IMG; }
    function applyBackground(){
      const bg = document.getElementById("bgLayer");
      if(bg) bg.style.backgroundImage = `url('${getBgForScreen(currentScreen)}')`;
    }

    function isUnlocked(){ return getStep() >= 3; }
    function canAccess(screen){
      if(isUnlocked()) return true;
      return ["welcome","acesso","cadastro","impacto"].includes(screen);
    }

    function goTo(screen){
      if(!canAccess(screen)){
        currentScreen = "cadastro";
        render();
        return;
      }
      currentScreen = screen;
      render();
    }

    function mountOnce(){
      const root = document.getElementById("root");
      root.innerHTML = `
        <div class="app-shell">
          <div id="bgSlot">
            <div class="bg-layer" id="bgLayer"></div>
            <div class="bg-overlay"></div>
          </div>
          <div id="screenSlot"></div>
          <div id="navSlot"></div>
          <div id="toastSlot"></div>
        </div>
      `;
    }

    function renderToast(){
      const slot = document.getElementById("toastSlot");
      if(slot) slot.innerHTML = `<div class="cp-toast ${toastShow?"show":""}">${esc(toastMsg)}</div>`;
    }

    function renderNav(){
      const slot = document.getElementById("navSlot");
      if(!slot) return;
      if(!isUnlocked()){ slot.innerHTML = ""; return; }

      const items = [
        {id:"prato", icon:"🍽️", label:"Prato"},
        {id:"dieta", icon:"🥗", label:"Dieta"},
        {id:"treino", icon:"💪", label:"Treino"},
        {id:"progresso", icon:"📈", label:"Progresso"},
        {id:"saude", icon:"❤️", label:"Saúde"},
        {id:"loja", icon:"🛍️", label:"Loja"},
        {id:"convite", icon:"📲", label:"Convite"},
        {id:"perfil", icon:"👤", label:"Perfil"}
      ];

      slot.innerHTML = `
        <nav class="bottom-nav">
          <div class="bottom-nav-inner">
            ${items.map(n=>`
              <button class="nav-btn ${currentScreen===n.id?"active":""}" onclick="goTo('${n.id}')">
                <span class="nav-icon">${n.icon}</span>${n.label}
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    function render(){
      const animate = (currentScreen !== lastScreen);
      lastScreen = currentScreen;

      const slot = document.getElementById("screenSlot");
      if(!slot) return;

      let html = "";
      if(currentScreen==="welcome") html = renderWelcome(animate);
      else if(currentScreen==="acesso") html = renderAcesso(animate);
      else if(currentScreen==="cadastro") html = renderCadastro(animate);
      else if(currentScreen==="impacto") html = renderImpacto(animate);
      else if(currentScreen==="prato") html = renderPrato(animate);
      else if(currentScreen==="dieta") html = renderDieta(animate);
      else if(currentScreen==="treino") html = renderTreino(animate);
      else if(currentScreen==="progresso") html = renderProgresso(animate);
      else if(currentScreen==="saude") html = renderSaude(animate);
      else if(currentScreen==="loja") html = renderLoja(animate);
      else if(currentScreen==="convite") html = renderConvite(animate);
      else if(currentScreen==="perfil") html = renderPerfil(animate);
      else html = renderWelcome(animate);

      slot.innerHTML = html;
      storageSet(KEY_LAST_SCREEN, currentScreen);
      trackScreen(currentScreen);

      if(currentScreen==="cadastro") wireCadastro();
      if(currentScreen==="prato") wirePrato();

      renderNav();
      renderToast();
      applyBackground();
    }

    function wireCadastro(){
      const bind = (id, key) => {
        const el = document.getElementById(id);
        if(!el) return;
        const save = () => { stateCad[key] = el.value; saveDraft(); };
        el.addEventListener("input", save);
        el.addEventListener("change", save);
      };

      bind("cadNome","nome");
      bind("cadSobrenome","sobrenome");
      bind("cadPeso","peso");
      bind("cadAltura","altura");
      bind("cadSexo","sexo");
      bind("cadNivel","nivel");
      bind("cadObjetivo","objetivo");
      bind("cadCondicao","condicao");
      bind("cadRestricoes","restricoes");
      bind("cadMobilidade","mobilidade");
      bind("cadIdadeGrupo","idadeGrupo");
      bind("cadLocalTreino","localTreino");

      const termo = document.getElementById("cadTermo");
      if(termo){
        termo.onchange = ()=>{ stateCad.termo = !!termo.checked; saveDraft(); };
      }

      const btnPcd = document.getElementById("btnPcd");
      const btnIdoso = document.getElementById("btnIdoso");
      const btnSed = document.getElementById("btnSed");

      const refresh = ()=>{
        if(btnPcd) btnPcd.textContent = stateCad.pcd ? "✅ PCD" : "PCD";
        if(btnIdoso) btnIdoso.textContent = stateCad.idoso ? "✅ Idoso" : "Idoso";
        if(btnSed) btnSed.textContent = stateCad.sedentario ? "✅ Sedentário" : "Sedentário";
      };

      if(btnPcd) btnPcd.onclick = ()=>{ stateCad.pcd=!stateCad.pcd; saveDraft(); refresh(); };
      if(btnIdoso) btnIdoso.onclick = ()=>{ stateCad.idoso=!stateCad.idoso; saveDraft(); refresh(); };
      if(btnSed) btnSed.onclick = ()=>{ stateCad.sedentario=!stateCad.sedentario; saveDraft(); refresh(); };
      refresh();
    }

      activeTimer = { id: exId, startedAt: Date.now(), min: Number(min||3) };

      track("treino_timer_iniciado", { exercicio: exId, minutos: String(min||3) });
      showToast("Timer iniciado ▶");
      render();

    function getTimerLeft(t){
      const total = (t.min * 60 * 1000);
      const spent = Date.now() - t.startedAt;
      const left = Math.max(0, total - spent);
      const mm = Math.floor(left / 60000);
      const ss = Math.floor((left % 60000) / 1000);
      return `${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    }

    function tryFinishExercise(){
      if(!activeTimer) return;
      const total = (activeTimer.min * 60 * 1000);
      const spent = Date.now() - activeTimer.startedAt;
      if(spent < total) return showToast("Ainda não. Espere o tempo mínimo.");

      const done = loadTrainDone();
      if(!done.includes(activeTimer.id)) done.push(activeTimer.id);
      saveTrainDone(done);
      addXP(2);
      track("treino_exercicio_concluido", { exercicio: activeTimer.id, minutos: String(activeTimer.min || "") });
      showToast("Concluído ✅");
      activeTimer = null;
      persistTimer();
      render();
    }

    function showTipForDay(day){
      const tips = {
        "Segunda — Peito + Tríceps":"Concentre em amplitude e controle. Não corra a repetição.",
        "Terça — Costas + Bíceps":"Pense em puxar com as costas, não com o braço.",
        "Quarta — Pernas":"Respire bem e mantenha joelho alinhado com o pé.",
        "Quinta — Ombros":"Faça leve e perfeito. Ombro responde a consistência.",
        "Sexta — Full body":"Controle a postura e mantenha o core firme.",
        "Segunda — Leve":"Ritmo confortável. Você deve conseguir conversar.",
        "Quarta — Intervalado":"Intenso no sprint, relaxa na caminhada.",
        "Sexta — Longa":"Pace constante. Melhor terminar inteiro do que quebrar.",
        "Segunda — Força":"Poucas reps, foco em técnica.",
        "Quarta — WOD":"Respiração manda. Quebre em blocos se precisar.",
        "Sexta — Metcon":"Ritmo sustentável vence explosão."
      };
      openModal("Dica do dia", esc(tips[day] || "Hidrate-se, aqueça e faça com segurança."));
    }

    setInterval(()=>{
      if(activeTimer){
        const el = document.getElementById("timerLeft");
        if(el) el.textContent = getTimerLeft(activeTimer);
      }
    }, 1000);

    function showHistory(){
      const plates = loadPlates();
      if(!plates.length){ openModal("Histórico", "Você ainda não salvou nenhum prato."); return; }
      const html = plates.slice(0,10).map(p=>`
        <div class="day-card">
          <div class="day-head">
            <div class="day-title">${esc(new Date(p.t).toLocaleString())}</div>
            <div class="cp-hint">Registro</div>
          </div>
          <div class="cp-hint" style="line-height:1.6">${esc(String(p.text||"")).replace(/\n/g,"<br>")}</div>
        </div>
      `).join("");
      openModal("Histórico (últimos 10)", html);
    }

    function shareApp(){
      const msg = "Estou usando o CheckPrato Elite. Top pra dieta, treino e progresso! 🔥";
      if(navigator.share){
        track("convite_share", { via: "navigator" });
        navigator.share({ text: msg }).catch(()=>{});
      }else{
        openModal("Compartilhar", "Seu celular não suportou compartilhamento automático. Use copiar mensagem.");
      }
    }

    function copyInvite(){
      const msg = "Estou usando o CheckPrato Elite. Top pra dieta, treino e progresso! 🔥";
      navigator.clipboard?.writeText(msg)
        .then(()=>{ track("convite_copiado", { tela: currentScreen }); showToast("Mensagem copiada ✅"); })
        .catch(()=> openModal("Copiar", esc(msg)));
    }

    async function analisarPrato(){
      if(!plateDataUrl) return showToast("Envie uma foto primeiro.");

      if(!AI_ENDPOINT){
        openModal("Análise indisponível", `
          No momento, a análise automática não está disponível.
          <br><br>
          Você pode continuar usando o app normalmente: dieta, treino e progresso.
        `);
        return showToast("Análise indisponível.");
      }

      track("prato_analise_iniciada", { tela: currentScreen });
      showToast("Analisando...");
      try{
        const base64 = plateDataUrl.split(",")[1] || "";
        const res = await fetch(AI_ENDPOINT, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ imageBase64: base64 })
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        plateAI = data;

        fillMacros(plateAI);

        const confirmText =
          `Análise sugeriu:\n${data.description || "Sem descrição"}\n\n`+
          `Calorias: ${data.calories ?? "—"}\n`+
          `Proteína: ${data.protein ?? "—"}g\n`+
          `Carboidrato: ${data.carbs ?? "—"}g\n`+
          `Gordura: ${data.fat ?? "—"}g\n`;

        plateConfirmText = confirmText;
        showConfirmBox(confirmText);
        track("prato_analise_sucesso", { calorias: String(data.calories ?? "") });
        showToast("Confirme o resultado ✅");
      }catch(e){
        track("prato_analise_erro", { mensagem: String(e?.message || "erro") });
        showToast("Erro na análise. Tente novamente.");
      }
    }

    function boot(){
      mountOnce();

      const access = safeParse(localStorage.getItem(KEY_ACCESS) || "null", null);
      if(access){
        stateAccessEmail = access.email || "";
        stateAccessPass = access.pass || "";
      }

      const draft = safeParse(localStorage.getItem(KEY_CAD_DRAFT) || "null", null);
      const p = loadProfile();
      if(draft) stateCad = { ...stateCad, ...draft };
      if(p) stateCad = { ...stateCad, ...p };

      const tLast = localStorage.getItem(KEY_TREINO_LAST);
      if(tLast && TREINO_BASE[tLast]) treinoMode = tLast;

      const lastDiet = safeParse(localStorage.getItem(KEY_DIETA_LAST) || "null", null);
      if(!lastDiet){
        const preferredMode =
          stateCad.objetivo === "Hipertrofia" ? "hipertrofia" :
          (String(stateCad.restricoes || "").toLowerCase().includes("glúten") ? "lowcarb" : "emagrecimento");
        dietaMode = preferredMode;
        storageSet(KEY_DIETA_LAST, makeDiet(dietaMode));
      }

      if(activeTimer){
        const total = (Number(activeTimer.min || 0) * 60 * 1000);
        const spent = Date.now() - Number(activeTimer.startedAt || 0);
        if(spent > total + (12 * 60 * 60 * 1000)){
          activeTimer = null;
          persistTimer();
        }
      }

      const profile = loadProfile();
      const step = getStep();
      const savedScreen = localStorage.getItem(KEY_LAST_SCREEN) || "";

      if(profile && profile.nome && profile.objetivo && step >= 3){
        currentScreen = canAccess(savedScreen) ? (savedScreen || "prato") : "prato";
      }else if(step <= 0){
        currentScreen = "welcome";
      }else if(step === 1){
        currentScreen = "acesso";
      }else if(step === 2){
        currentScreen = "cadastro";
      }else{
        currentScreen = "prato";
      }

      render();
      track("app_aberto", { tela_inicial: currentScreen, versao: "elite-blindado-v3" });
    }

    window.addEventListener("pagehide", ()=>{
      persistAccess();
      persistCadastroDraft();
      persistTimer();
    });

    document.addEventListener("visibilitychange", ()=>{
      if(document.hidden){
        persistAccess();
        persistCadastroDraft();
        persistTimer();
      }
    });

    boot();
  </script>
</body>
</html>
