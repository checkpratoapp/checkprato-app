<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CheckPrato Elite V4 - Personalizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg-glass: rgba(15, 23, 42, 0.8); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: #05070a; color: white; min-height: 100vh; overflow: hidden; }

        /* Backgrounds Naturais */
        #fundo-dinamico { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: 1s; }
        .fundo-home { background: radial-gradient(circle at 20% 20%, #1e293b, #05070a); }
        .fundo-treino { background: radial-gradient(circle at 80% 80%, #450a0a, #05070a); }

        /* TELA DE CADASTRO / ESCOLHA (ONBOARDING) */
        #onboarding {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070a; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        .opcoes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; width: 100%; }
        .tag-choice {
            padding: 15px; border: 1px solid var(--border); border-radius: 15px;
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .tag-choice.selected { border-color: var(--primary); background: rgba(0,255,136,0.1); color: var(--primary); }

        /* Interface Principal */
        header { padding: 15px; text-align: center; font-weight: 700; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .aba { display: none; padding: 20px; height: calc(100vh - 160px); overflow-y: auto; }
        .ativa { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-elite {
            background: var(--bg-glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 15px; margin-bottom: 15px;
        }
        .btn-action {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(2, 6, 23, 0.95); display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid var(--border);
        }
        .nav-btn { background: none; border: none; color: #64748b; font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="fundo-dinamico" class="fundo-home"></div>

<div id="onboarding">
    <h2>Bem-vindo ao Elite ⚔️</h2>
    <p>Escolha seu estilo de vida (Selecione até 3)</p>
    <div class="opcoes-grid">
        <div class="tag-choice" onclick="toggleChoice(this, 'muay-thai')">🥊 Muay Thai</div>
        <div class="tag-choice" onclick="toggleChoice(this, 'crossfit')">🏋️ CrossFit</div>
        <div class="tag-choice" onclick="toggleChoice(this, 'academia')">💪 Musculação</div>
        <div class="tag-choice" onclick="toggleChoice(this, 'corrida')">🏃 Corrida</div>
        <div class="tag-choice" onclick="toggleChoice(this, 'futebol')">⚽ Esportes</div>
        <div class="tag-choice" onclick="toggleChoice(this, 'yoga')">🧘 Yoga</div>
    </div>
    <button class="btn-action" style="margin-top:40px; width:80%" onclick="finalizarCadastro()">COMEÇAR JORNADA</button>
</div>

<div id="main-content" style="display:none">
    <header>CHECKPRATO <span style="color:var(--primary)">ELITE</span></header>
    
    <div id="home" class="aba ativa">
        <div class="card-elite" style="text-align:center">
            <div id="avatar" style="font-size:5rem; margin-bottom:10px">👤</div>
            <h3 id="display-nome">Atleta Elite</h3>
            <p id="display-xp">XP: 0</p>
        </div>
    </div>

    <div id="treino" class="aba">
        <h3>🎯 Seu Treino Personalizado</h3>
        <div id="lista-personalizada"></div>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
        <h3>🌍 Explorar Outros</h3>
        <div id="lista-explorar"></div>
    </div>
</div>

<nav id="nav-principal" class="nav-bar" style="display:none">
    <button class="nav-btn active" onclick="trocarAba('home')"><i class="fas fa-user"></i><br>Perfil</button>
    <button class="nav-btn" onclick="trocarAba('treino')"><i class="fas fa-dumbbell"></i><br>Treino</button>
</nav>

<script>
    const TREINOS_MASTER = [
        { id: 1, cat: 'muay-thai', nome: "Sombra e Sacos", xp: 60, desc: "Sequência de cotovelos e joelhos." },
        { id: 2, cat: 'crossfit', nome: "WOD Metcon", xp: 80, desc: "Máxima intensidade por tempo." },
        { id: 3, cat: 'academia', nome: "Push Day", xp: 50, desc: "Peito, ombros e tríceps." },
        { id: 4, cat: 'corrida', nome: "Tiros de 400m", xp: 45, desc: "Explosão aeróbica na rua." },
        { id: 5, cat: 'futebol', nome: "Partida Amigável", xp: 100, desc: "Gasto calórico de jogo real." },
        { id: 6, cat: 'yoga', nome: "Saudação ao Sol", xp: 30, desc: "Flexibilidade e controle mental." }
    ];

    let escolhas = [];
    let userXP = parseInt(localStorage.getItem('elite_xp')) || 0;

    // --- CADASTRO ---
    function toggleChoice(el, esporte) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            escolhas = escolhas.filter(i => i !== esporte);
        } else {
            if (escolhas.length < 3) {
                el.classList.add('selected');
                escolhas.push(esporte);
            } else {
                alert("Escolha no máximo 3 estilos!");
            }
        }
    }

    function finalizarCadastro() {
        if (escolhas.length === 0) return alert("Escolha pelo menos 1 estilo!");
        localStorage.setItem('elite_escolhas', JSON.stringify(escolhas));
        document.getElementById('onboarding').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('nav-principal').style.display = 'flex';
        renderTreinos();
    }

    // --- NAVEGAÇÃO ---
    function trocarAba(aba) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(aba).classList.add('ativa');
        document.getElementById('fundo-dinamico').className = `fundo-${aba}`;
    }

    // --- RENDERIZAR TREINOS COM BASE NA ESCOLHA ---
    function renderTreinos() {
        const personal = document.getElementById('lista-personalizada');
        const explorar = document.getElementById('lista-explorar');
        
        const meusTreinos = TREINOS_MASTER.filter(t => escolhas.includes(t.cat));
        const outrosTreinos = TREINOS_MASTER.filter(t => !escolhas.includes(t.cat));

        const cardHTML = (t) => `
            <div class="card-elite" style="border-left: 4px solid var(--primary)">
                <b>${t.nome}</b> <span style="float:right; color:var(--primary)">+${t.xp} XP</span>
                <p style="font-size:0.8rem; color:#94a3b8; margin:5px 0">${t.desc}</p>
                <button class="btn-action" onclick="ganharXP(${t.xp})">CONCLUIR</button>
            </div>
        `;

        personal.innerHTML = meusTreinos.map(t => cardHTML(t)).join('');
        explorar.innerHTML = outrosTreinos.map(t => cardHTML(t)).join('');
    }

    function ganharXP(val) {
        userXP += val;
        localStorage.setItem('elite_xp', userXP);
        document.getElementById('display-xp').innerText = `XP: ${userXP}`;
        
        // Crescimento do Boneco
        const scale = 1 + (userXP / 5000);
        document.getElementById('avatar').style.transform = `scale(${Math.min(scale, 1.6)})`;
        alert(`Treino finalizado! +${val} XP.`);
    }

    // Verificar se já tem cadastro
    const salvo = localStorage.getItem('elite_escolhas');
    if (salvo) {
        escolhas = JSON.parse(salvo);
        finalizarCadastro();
    }
</script>
</body>
</html>
