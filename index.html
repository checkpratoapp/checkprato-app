<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CheckPrato Elite | Premium Fitness</title>

/* =========================================
   DESIGN SYSTEM & RESETS (Visual Premium)
   ========================================= */
:root {
  --bg-dark: #05070a;
  --bg-panel: rgba(17, 24, 39, 0.7);
  --primary: #3b82f6; /* Neon Blue */
  --primary-glow: rgba(59, 130, 246, 0.5);
  --accent: #10b981; /* Emerald Green */
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --glass: blur(12px) saturate(180%);
  --border: rgba(255, 255, 255, 0.08);
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; padding: 0;
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-dark);
  background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #05070a 100%);
  color: var(--text-main);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* =========================================
   LAYOUT PRINCIPAL
   ========================================= */
#app {
  display: flex; flex-direction: column;
  height: 100%; width: 100%; max-width: 480px; /* Mobile First */
  margin: 0 auto;
  position: relative;
}

.page-container {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 100px 20px; /* Padding bottom para a nav */
  scrollbar-width: none; /* Firefox */
}
.page-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

/* =========================================
   COMPONENTES UI (Cards, Botoes)
   ========================================= */
.card {
  background: var(--bg-panel);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card::before { /* Brilho sutil no topo */
  content:''; position: absolute; top:0; left: 0; width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

h1, h2, h3 { margin: 0; font-weight: 600; }
h2 { font-size: 1.5rem; }
h3 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 8px;}
p { margin: 0; font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px;
  border: none; border-radius: 16px;
  font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1rem;
  cursor: pointer; transition: all 0.3s var(--ease);
  position: relative; overflow: hidden;
}
.btn-primary {
  background: var(--primary); color: #fff;
  box-shadow: 0 4px 14px 0 var(--primary-glow);
}
.btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 6px 0 var(--primary-glow); }
.btn-primary:disabled { background: #374151; box-shadow: none; cursor: not-allowed; opacity: 0.6; }

/* Cooldown Timer Overlay */
.cooldown-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 1.2rem;
  border-radius: 16px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.btn.on-cooldown .cooldown-overlay { opacity: 1; }

/* =========================================
   AVATAR REAL + PROGRESSO
   ========================================= */
.avatar-section {
  text-align: center; margin-bottom: 24px;
  position: relative; display: flex; flex-direction: column; align-items: center;
}

.avatar-container {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  position: relative; margin-bottom: 12px;
  box-shadow: 0 0 30px 0 rgba(0, 0, 0, 0.5);
}

.avatar-real {
  width: 90%; height: 90%;
  object-fit: contain; /* Ou cover se for modelo 3D renderizado */
  /* Animação de movimento sutil (idle) */
  animation: idleMove 4s infinite ease-in-out;
}

@keyframes idleMove {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-5px) rotate(1deg); }
}

.level-badge {
  position: absolute; bottom: -5px; right: 20px;
  background: var(--accent); color: #fff;
  padding: 4px 12px; border-radius: 12px;
  font-weight: 700; font-size: 0.8rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.xp-bar-container {
  width: 100%; max-width: 250px;
  height: 6px; background: rgba(255,255,255,0.05);
  border-radius: 3px; overflow: hidden; margin-top: 8px;
}
.xp-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
  width: 0%; /* Dinamico */
  transition: width 0.5s var(--ease);
  box-shadow: 0 0 10px var(--primary-glow);
}

/* =========================================
   NAVEGAÇÃO INFERIOR (Premium)
   ========================================= */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; width: 100%;
  height: 80px;
  background: rgba(10, 15, 26, 0.85);
  backdrop-filter: blur
