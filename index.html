<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckPrato PRO + Avatar Nível 2</title><style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {padding:15px;text-align:center;background:#020617;font-size:20px;}
.menu {display:flex;position:fixed;bottom:0;width:100%;background:#020617;}
.menu button {flex:1;padding:12px;border:none;background:#020617;color:white;}
.aba {display:none;padding:15px;padding-bottom:70px;}
.ativa {display:block;}
.card {background:#1e293b;margin:10px 0;padding:15px;border-radius:12px;}
input, select {width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px;}
button.acao {background:#00ff88;border:none;padding:10px;border-radius:8px;margin-top:5px;width:100%;}
.avatar {font-size:60px;}
</style></head><body>
<header>CheckPrato 🎮 Avatar PRO</header><!-- CADASTRO --><div id="cadastro" class="aba ativa">
<h3>Cadastro</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<input id="confirmar" type="password" placeholder="Confirmar senha">
<select id="sexo">
<option value="">Sexo</option>
<option value="homem">Homem</option>
<option value="mulher">Mulher</option>
</select>
<input id="idade" type="number" placeholder="Idade">
<button class="acao" onclick="cadastrar()">Cadastrar</button>
</div><!-- HOME --><div id="home" class="aba">
<h3>Seu Avatar</h3>
<div class="avatar" id="avatar"></div>
<p id="nivel"></p><div class="card">
<button class="acao" onclick="ganharXP('refeicao')">🍽️ Registrar refeição</button>
<button class="acao" onclick="ganharXP('treino')">🏋️ Fazer treino</button>
<button class="acao" onclick="ganharXP('meta')">🎯 Bater meta</button>
</div><div class="card" id="conquistas"></div>
</div><div class="menu">
<button onclick="trocar('home')">🎮</button>
</div><script>
let usuario = null;

window.trocar = (aba) => {
document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
document.getElementById(aba).classList.add('ativa');
}

window.cadastrar = () => {
if (senha.value !== confirmar.value) {
alert("Senhas diferentes"); return;
}

usuario = {
sexo: sexo.value,
idade: idade.value,
xp: 0,
nivel: 1,
conquistas: []
};

atualizarAvatar();
trocar('home');
}

function ganharXP(tipo){
if(!usuario) return;

if(tipo === 'refeicao') usuario.xp += 20;
if(tipo === 'treino') usuario.xp += 40;
if(tipo === 'meta') usuario.xp += 60;

verificarNivel();
verificarConquistas();
atualizarAvatar();
}

function verificarNivel(){
if(usuario.xp >= 100){
usuario.nivel++;
usuario.xp = 0;
}
}

function verificarConquistas(){
if(usuario.nivel === 2 && !usuario.conquistas.includes('iniciante')){
usuario.conquistas.push('iniciante');
}

if(usuario.nivel === 5 && !usuario.conquistas.includes('focado')){
usuario.conquistas.push('focado');
}
}

function atualizarAvatar(){
let avatarIcon = "👤";

if(usuario.sexo === "homem") avatarIcon = "👨";
if(usuario.sexo === "mulher") avatarIcon = "👩";

if(usuario.nivel >= 3) avatarIcon = "🏃";
if(usuario.nivel >= 5) avatarIcon = "💪";
if(usuario.nivel >= 8) avatarIcon = "🦾";

avatar.innerText = avatarIcon;
nivel.innerText = `Nível: ${usuario.nivel} | XP: ${usuario.xp}/100`;

conquistas.innerHTML = "<b>Conquistas:</b><br>" + usuario.conquistas.join('<br>');
}

</script></body>
</html>
