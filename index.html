<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CheckPrato Elite — Acesso</title>
  <style>
    :root {
      --bg: #050a14;
      --card: rgba(255, 255, 255, 0.03);
      --accent: #3b82f6;
      --text: #f0f4f8;
      --muted: #8aa0c7;
      --stroke: rgba(255, 255, 255, 0.08);
      --max-w: 450px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

    .app-shell {
      width: 100%; max-width: var(--max-w);
      background: linear-gradient(180deg, #0a1628 0%, #050a14 100%);
      border-radius: 40px; overflow: hidden;
      display: flex; flex-direction: column; position: relative;
      border: 1px solid var(--stroke); box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .page { display: none; padding: 40px 30px; flex-direction: column; animation: fadeIn 0.4s ease; }
    .page.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

    /* Forms */
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
    input, select {
      width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.02); color: white; font-size: 15px; transition: 0.3s;
    }
    input:focus { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); outline: none; }

    .terms { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: var(--muted); margin: 20px 0; }
    .terms input { width: 18px; height: 18px; cursor: pointer; }

    .btn-main {
      background: var(--accent); color: white; border: none; border-radius: 18px;
      padding: 18px; width: 100%; font-weight: 700; font-size: 16px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(59,130,246,0.3); transition: 0.3s;
    }
    .btn-main:active { transform: scale(0.98); }
    
    .switch-mode { text-align: center; margin-top: 25px; font-size: 14px; color: var(--muted); cursor: pointer; }
    .switch-mode b { color: var(--accent); }

    /* App Content */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: var(--max-w); background: rgba(10,22,40,0.9); backdrop-filter: blur(20px); display: none; justify-content: space-around; padding: 20px; border-top: 1px solid var(--stroke); border-radius: 30px 30px 0 0; }
    .nav.active { display: flex; }
  </style>
</head>
<body>

  <div class="app-shell">
    
    <div id="p-auth" class="page active">
      <h1 id="auth-title">Criar Conta</h1>
      <p id="auth-sub" class="subtitle">Bem-vindo ao CheckPrato Elite.</p>

      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="pass" placeholder="••••••••">
      </div>

      <div id="register-only">
        <div class="terms">
          <input type="checkbox" id="terms-check">
          <span>Aceito os Termos de Uso e a Política de Privacidade de Saúde.</span>
        </div>
      </div>

      <button id="btn-action" class="btn-main">Cadastrar Agora</button>
      
      <p class="switch-mode" id="toggle-auth">Já tem uma conta? <b>Entrar</b></p>
    </div>

    <div id="p-setup" class="page">
      <h1>Seu Perfil</h1>
      <p class="subtitle">Personalize sua experiência inteligente.</p>
      
      <div class="input-group">
        <label>Nome de Usuário</label>
        <input type="text" id="user-name" placeholder="Como quer ser chamado?">
      </div>

      <div class="input-group">
        <label>Esporte Foco</label>
        <select id="sport">
          <option>Musculação</option>
          <option>Jiu-Jitsu</option>
          <option>Muay Thai</option>
          <option>Corrida / Funcional</option>
        </select>
      </div>

      <button class="btn-main" onclick="saveProfile()">Concluir Perfil</button>
    </div>

    <div id="p-home" class="page">
      <div id="header-user"></div>
      <div style="background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--stroke);">
        <h3>Painel de Saúde</h3>
        <p style="color:var(--muted); margin-top:10px; font-size:14px;">Inicie sua jornada Elite capturando sua primeira refeição.</p>
      </div>
    </div>

    <nav class="nav" id="navbar">
      <button style="background:none; border:none; color:var(--accent); font-weight:700;">SAÚDE</button>
      <button onclick="logout()" style="background:none; border:none; color:var(--muted);">SAIR</button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

    const config = {
      apiKey: "AIzaSyCZTpsIEJqdxjc6E4KZaqogtkuyLn9uTDY",
      authDomain: "checkprato-a900b.firebaseapp.com",
      projectId: "checkprato-a900b",
      storageBucket: "checkprato-a900b.firebasestorage.app",
      messagingSenderId: "588806296180",
      appId: "1:588806296180:web:77918231454174a7d6e87a"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = false;

    // ALTERNAR ENTRE LOGIN E CADASTRO
    document.getElementById('toggle-auth').onclick = () => {
      isLogin = !isLogin;
      document.getElementById('auth-title').innerText = isLogin ? "Entrar" : "Criar Conta";
      document.getElementById('btn-action').innerText = isLogin ? "Acessar Painel" : "Cadastrar Agora";
      document.getElementById('register-only').style.display = isLogin ? "none" : "block";
      document.getElementById('toggle-auth').innerHTML = isLogin ? "Não tem conta? <b>Cadastrar</b>" : "Já tem uma conta? <b>Entrar</b>";
    };

    // AÇÃO DE AUTENTICAÇÃO
    document.getElementById('btn-action').onclick = async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      
      if(!email || !pass) return alert("Preencha todos os campos.");
      if(!isLogin && !document.getElementById('terms-check').checked) return alert("Aceite os termos para continuar.");

      try {
        if(isLogin) {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          const res = await createUserWithEmailAndPassword(auth, email, pass);
          show('p-setup');
        }
      } catch (e) {
        alert("Erro: " + e.message);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().setupDone) start(snap.data());
        else show('p-setup');
      } else {
        show('p-auth');
      }
    });

    window.saveProfile = async () => {
      const name = document.getElementById('user-name').value;
      if(!name) return alert("Digite seu nome.");
      const data = { name, sport: document.getElementById('sport').value, setupDone: true };
      await setDoc(doc(db, "users", auth.currentUser.uid), data, { merge: true });
      start(data);
    };

    function start(data) {
      show('p-home');
      document.getElementById('navbar').classList.add('active');
      document.getElementById('header-user').innerHTML = `
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
          <div style="width:60px; height:60px; border-radius:20px; border:2px solid var(--accent); background:#000; overflow:hidden;">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${data.name}" style="width:100%">
          </div>
          <div><p style="font-weight:700;">${data.name}</p><p style="font-size:12px; color:var(--accent)">${data.sport}</p></div>
        </div>
      `;
    }

    function show(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    window.logout = () => signOut(auth).then(() => location.reload());
  </script>
</body>
</html>
