<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckPrato Elite</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b0f1a;color:#fff}
.page{padding:20px}
.card{background:#111827;border-radius:16px;padding:16px;margin-top:12px}
.btn{padding:10px 14px;border:none;border-radius:12px;background:#3b82f6;color:#fff;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.avatar{
  width:120px;height:120px;margin:auto;
  background:#1f2937;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;animation:float 3s infinite ease-in-out
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
</style>
</head>
<body><div id="app"></div><script>
/************* CONFIG *************/
const AI_ENDPOINT = "COLE_SEU_ENDPOINT_AQUI";

/************* FIREBASE *************/
import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then(async ({initializeApp})=>{
  const config = {
    apiKey:"SUA_API_KEY",
    authDomain:"checkprato-a900b.firebaseapp.com",
    databaseURL:"https://checkprato-a900b-default-rtdb.firebaseio.com",
    projectId:"checkprato-a900b",
    storageBucket:"checkprato-a900b.appspot.com",
    messagingSenderId:"242390673985",
    appId:"1:242390673985:web:f658e933fc4e8b1e8834c0"
  };
  initializeApp(config);
});

/************* ESTADO *************/
let screen = "dashboard";
let xp = 0;
let firstAccess = !localStorage.getItem("first_access_done");

if(firstAccess){
  xp += 50;
  localStorage.setItem("first_access_done","1");
}

/************* AVATAR *************/
function getAvatar(){
  if(xp < 50) return "🙂";
  if(xp < 150) return "😎";
  if(xp < 300) return "💪";
  return "🔥";
}

/************* UI *************/
function render(){
  const app = document.getElementById("app");

  app.innerHTML = `
  <div class="page">
    <div class="avatar">${getAvatar()}</div>
    <h2 style="text-align:center">XP: ${xp}</h2>

    ${firstAccess ? `<div class="card">🎁 Primeiro acesso liberado com tudo desbloqueado!</div>` : ``}

    <div class="grid">
      <button class="btn" onclick="go('prato')">🍽️ Prato</button>
      <button class="btn" onclick="go('dieta')">🥗 Dieta</button>
      <button class="btn" onclick="go('treino')">💪 Treino</button>
      <button class="btn" onclick="go('evolucao')">📈 Evolução</button>
    </div>

    ${renderScreen()}
  </div>
  `;
}

function renderScreen(){
  if(screen==="prato"){
    return `<div class="card">
      <h3>Análise de Prato</h3>
      <button class="btn" onclick="analisar()">Analisar (Gemini)</button>
    </div>`;
  }

  if(screen==="dieta"){
    return `<div class="card">
      <h3>Dieta</h3>
      <p>Plano automático baseado no objetivo</p>
    </div>`;
  }

  if(screen==="treino"){
    return `<div class="card">
      <h3>Treino</h3>
      <button class="btn" onclick="ganharXP()">Concluir treino</button>
    </div>`;
  }

  if(screen==="evolucao"){
    return `<div class="card">
      <h3>Evolução</h3>
      <p>Seu progresso aparece aqui</p>
    </div>`;
  }

  return `<div class="card">Dashboard</div>`;
}

/************* AÇÕES *************/
function go(s){screen=s;render();}

function ganharXP(){
  xp += 10;
  render();
}

async function analisar(){
  if(!AI_ENDPOINT.includes("http")){
    alert("Configure o endpoint Gemini");
    return;
  }
  alert("Chamando IA...");
}

render();
</script></body>
</html>
