<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>CheckPrato Elite — Dieta • Treino • Prato • Progresso</title>

  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{ width:100%; height:100%; background:#02050b; color:#eaf2ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; overflow-x:hidden; }
    body{ background: radial-gradient(circle at 20% 0%, #0a1f38, #000) fixed; min-height:100vh; }

    /* anti-flicker / suaviza troca de tela */
    body, .app-shell, .page-wrap { -webkit-font-smoothing: antialiased; transform: translateZ(0); }

    :root{
      --blue:#3b82f6;
      --blue2:#2563eb;
      --bgCard1:#0b1a2d;
      --bgCard2:#07111f;
      --muted:#8aa0c7;
      --stroke:rgba(255,255,255,0.08);
      --max:430px;
    }

    .app-shell{
      width:100%;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at 20% 0%, #0a1f38, #000);
    }

    /* ===== FUNDO POR ABA (imagem + overlay) ===== */
    #bgSlot{ position:absolute; inset:0; z-index:0; }
    .bg-layer{
      position:absolute; inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      filter:saturate(1.05) contrast(1.05);
      opacity:.95;
      transform: translateZ(0);
      will-change: background-image;
    }
    .bg-overlay{
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 30% 10%, rgba(59,130,246,.22), transparent 55%),
        radial-gradient(circle at 70% 30%, rgba(37,99,235,.18), transparent 60%),
        linear-gradient(180deg, rgba(2,5,11,.58), rgba(2,5,11,.90));
      pointer-events:none;
    }

    /* animação de entrada (leve) */
    .screen-enter{ animation: screenIn .18s ease-out forwards; }
    @keyframes screenIn{ from{ opacity:0; transform: translateY(10px);} to{ opacity:1; transform: translateY(0);} }

    .page-wrap{
      width:100%;
      max-width: var(--max);
      padding:18px 18px 130px;
      overflow-y:auto;
      position:relative;
      z-index:5;
    }

    .logo-wrap{ display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:8px; }
    .logo-icon{
      width:32px; height:32px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-radius: 8px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 0 20px rgba(59,130,246,0.35);
      font-weight:900;
    }
    .logo-text{ font-size:20px; font-weight:900; color:#eaf2ff; }
    .logo-text span{ color: var(--blue); }

    .cp-h1{ font-size:30px; font-weight:900; color:#eaf2ff; margin:8px 0 4px; }
    .cp-hint{ font-size:13px; color: var(--muted); font-weight:650; line-height:1.45; }
    .cp-label{ font-size:11px; font-weight:850; letter-spacing:.8px; text-transform:uppercase; color: var(--muted); margin-top:14px; margin-bottom:4px; }

    /* helper centralizado */
    .tcenter{ text-align:center; }

    .cp-card{
      background: linear-gradient(180deg, var(--bgCard1), var(--bgCard2));
      border-radius:22px;
      padding:18px;
      margin-top:14px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .cp-input{
      width:100%;
      padding:12px 14px;
      margin-top:10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:#071728;
      color:#eaf2ff;
      font-size:14px;
      outline:none;
    }
    .cp-input:focus{ border-color: rgba(59,130,246,0.55); }

    .grid-2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .btn-row{ display:flex; gap:10px; margin-top:12px; }

    .btn-neon{
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color:#fff;
      font-weight:900;
      border:none;
      border-radius:50px;
      padding:14px 24px;
      width:100%;
      font-size:16px;
      box-shadow: 0 0 20px rgba(59,130,246,0.35), 0 4px 16px rgba(0,0,0,0.45);
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-neon:active{ transform: translateY(1px) scale(.995); }
    .btn-neon:hover{ box-shadow: 0 0 28px rgba(59,130,246,0.55), 0 6px 20px rgba(0,0,0,0.55); }

    .btn-outline{
      background: transparent;
      color:#eaf2ff;
      font-weight:800;
      border:1.5px solid rgba(234,242,255,0.28);
      border-radius:50px;
      padding:13px 24px;
      width:100%;
      font-size:15px;
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-outline:hover{ border-color: var(--blue); color: var(--blue); }

    .btn-secondary{
      background: rgba(255,255,255,0.06);
      color:#eaf2ff;
      font-weight:800;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:14px;
      padding:12px 18px;
      font-size:14px;
      transition: all .15s ease;
      flex:1;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn-secondary:hover{ background: rgba(59,130,246,0.10); border-color: rgba(59,130,246,0.30); }

    .cp-divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin:16px 0;
    }

    .cp-toast{
      position:fixed;
      top:20px;
      left:50%;
      transform: translateX(-50%) translateY(-90px);
      background:#0b1a2d;
      border:1px solid rgba(59,130,246,0.40);
      color:#eaf2ff;
      padding:12px 18px;
      border-radius:50px;
      font-weight:800;
      font-size:14px;
      z-index:9999;
      transition: transform .25s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      max-width: calc(100vw - 24px);
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cp-toast.show{ transform: translateX(-50%) translateY(0); }

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:50%;
      transform: translateX(-50%);
      width:100%;
      max-width: var(--max);
      background: rgba(7, 23, 40, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 8px 12px calc(18px + env(safe-area-inset-bottom));
      z-index:100;
    }
    .bottom-nav-inner{ display:flex; gap:4px; }
    .nav-btn{
      flex:1;
      border:none;
      padding:8px 4px;
      border-radius:14px;
      background:transparent;
      color: var(--muted);
      font-weight:800;
      font-size:10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn .nav-icon{ font-size:20px; }
    .nav-btn.active{ color: var(--blue); background: rgba(59,130,246,0.10); }

    .mini-profile{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px;
      background: rgba(255,255,255,0.03);
      border-radius:14px;
      margin-bottom:12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .mini-avatar{
      width:44px; height:44px;
      border-radius:50%;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      display:flex; align-items:center; justify-content:center;
      color:#fff;
      font-weight:900;
      flex-shrink:0;
      font-size:20px;
      overflow:hidden;
    }
    .mini-avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
    .mini-name{ font-weight:900; font-size:14px; color:#eaf2ff; }
    .mini-sub{ font-size:12px; color: var(--muted); font-weight:700; }

    /* chips esportes */
    .chips{ display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
    .chip{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: rgba(234,242,255,0.85);
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.on{
      border-color: rgba(59,130,246,0.55);
      background: rgba(59,130,246,0.18);
      box-shadow: 0 0 0 6px rgba(59,130,246,0.10);
    }

    /* prato */
    .photo-preview{
      width:100%;
      height:190px;
      border-radius:18px;
      background:#071728;
      border:1px solid rgba(255,255,255,0.08);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      color: rgba(234,242,255,0.70);
      font-weight:900;
    }
    .photo-preview img{ width:100%; height:100%; object-fit:cover; display:block; }

    .stat-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px; }
    .stat-box{
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius:16px;
      padding:12px;
      text-align:center;
    }
    .stat-val{ font-size:22px; font-weight:1000; color: var(--blue); line-height:1.1; margin:4px 0 2px; }
    .stat-key{ font-size:11px; font-weight:850; color: var(--muted); text-transform:uppercase; }

    .confirm-box{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(59,130,246,0.25);
      background: rgba(59,130,246,0.08);
      display:none;
    }
    .confirm-title{ font-weight:1000; margin-bottom:8px; color:#eaf2ff; }
    .confirm-actions{ display:flex; gap:10px; margin-top:10px; }

    /* treino cards */
    .day-card{
      background: rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
    }
    .day-head{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .day-title{ font-weight:1000; font-size:13px; color: var(--blue); }
    .exercise{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .exercise:last-child{ border-bottom:none; }
    .ex-left{ display:flex; align-items:center; gap:10px; min-width:0; }
    .ex-img{
      width:44px; height:44px;
      border-radius:12px;
      background: rgba(59,130,246,0.12);
      border:1px solid rgba(59,130,246,0.22);
      overflow:hidden;
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:1000;
      color: rgba(234,242,255,0.9);
    }
    .ex-img img{ width:100%; height:100%; object-fit:cover; display:block; }
    .ex-name{ font-weight:900; font-size:13px; color:#eaf2ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 170px; }
    .ex-detail{ font-size:12px; color: var(--muted); font-weight:700; }

    /* modal */
    .modal-back{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.60);
      display:none;
      z-index: 2000;
      padding: 18px;
      overflow:auto;
    }
    .modal{
      width:100%;
      max-width: 520px;
      margin: 60px auto;
      background: #0b1a2d;
      border:1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.60);
      padding: 16px;
    }
    .modal h3{ margin:0 0 10px; }
    .modal .xrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .xbtn{
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color:#eaf2ff;
      border-radius:12px;
      padding:8px 10px;
      font-weight:900;
      cursor:pointer;
    }

    /* “progresso 3D” fake/visual */
    .orb{
      width:100%;
      height:190px;
      border-radius: 20px;
      border:1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at 30% 30%, rgba(59,130,246,0.40), transparent 55%),
        radial-gradient(circle at 70% 60%, rgba(37,99,235,0.35), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      position:relative;
      overflow:hidden;
    }
    .orb::after{
      content:"";
      position:absolute; inset:-40px;
      background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.16), transparent 55%);
      transform: rotate(12deg);
    }
    .orb-label{
      position:absolute; left:14px; bottom:14px; right:14px;
      display:flex; justify-content:space-between; gap:10px; align-items:flex-end;
    }
    .orb-label b{ font-size:16px; font-weight:1000; }
    .orb-label span{ font-size:12px; color: rgba(234,242,255,0.78); font-weight:800; }
  </style>
</head>

    function esc(s){ return String(s??"").replace(/[&<>"]/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m])); }
    function showToast(msg){
      toastMsg = msg;
      toastShow = true;
      renderToast();
      setTimeout(()=>{ toastShow=false; renderToast(); }, 2400);
    }

    function openModal(title, html){
      document.getElementById("modalTitle").textContent = title || "Dica";
      document.getElementById("modalBody").innerHTML = html || "";
      document.getElementById("modalBack").style.display = "block";
    }
    function closeModal(){
      document.getElementById("modalBack").style.display = "none";
    }

    function readFileAsDataUrl(file){
      return new Promise((resolve,reject)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result||""));
        r.onerror = ()=> reject(new Error("Falha ao ler arquivo"));
        r.readAsDataURL(file);
      });
    }

    function getProfileDisplay(){
      const p = loadProfile();
      const fullName = p ? `${p.nome||""} ${p.sobrenome||""}`.trim() : "";
      const name = fullName || "Visitante";
      const avatar = p?.avatarDataUrl || "";
      return { name, avatar };
    }

    /***********************
     * BLOQUEIO POR ETAPAS
     ***********************/
    function isUnlocked(){ return getStep() >= 3; }
    function canAccess(screen){
      if(isUnlocked()) return true;
      return ["welcome","acesso","cadastro","impacto"].includes(screen);
    }
    function goTo(screen){
      if(!canAccess(screen)){
        showToast("Conclua o cadastro para liberar as abas.");
        currentScreen = "cadastro";
        render();
        return;
      }
      currentScreen = screen;
      render();
    }

    /***********************
     * MOUNT ONCE
     ***********************/
    function mountOnce(){
      const root = document.getElementById("root");
      root.innerHTML = `
        <div class="app-shell">
          <div id="bgSlot">
            <div class="bg-layer" id="bgLayer"></div>
            <div class="bg-overlay"></div>
          </div>

          <div id="screenSlot"></div>
          <div id="navSlot"></div>
          <div id="toastSlot"></div>
        </div>
      `;
    }

    function renderToast(){
      const slot = document.getElementById("toastSlot");
      if(!slot) return;
      slot.innerHTML = `<div class="cp-toast ${toastShow?"show":""}">${esc(toastMsg)}</div>`;
    }

    function renderNav(){
      const slot = document.getElementById("navSlot");
      if(!slot) return;

      if(!isUnlocked()){ slot.innerHTML = ""; return; }

      const items = [
        {id:"prato", icon:"🍽️", label:"Prato"},
        {id:"dieta", icon:"🥗", label:"Dieta"},
        {id:"treino", icon:"💪", label:"Treino"},
        {id:"progresso", icon:"📈", label:"Progresso"},
        {id:"saude", icon:"❤️", label:"Saúde"},
        {id:"loja", icon:"🛍️", label:"Loja"},
        {id:"convite", icon:"📲", label:"Convite"},
        {id:"perfil", icon:"👤", label:"Perfil"},
      ];

      slot.innerHTML = `
        <nav class="bottom-nav">
          <div class="bottom-nav-inner">
            ${items.map(n=>`
              <button class="nav-btn ${currentScreen===n.id?"active":""}" onclick="goTo('${n.id}')">
                <span class="nav-icon">${n.icon}</span>${n.label}
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    /***********************
     * RENDER
     ***********************/
    function render(){
      const animate = (currentScreen !== lastScreen);
      lastScreen = currentScreen;

      const slot = document.getElementById("screenSlot");
      if(!slot) return;

      let html = "";
      if(currentScreen==="welcome") html = renderWelcome(animate);
      else if(currentScreen==="acesso") html = renderAcesso(animate);
      else if(currentScreen==="cadastro") html = renderCadastro(animate);
      else if(currentScreen==="impacto") html = renderImpacto(animate);
      else if(currentScreen==="prato") html = renderPrato(animate);
      else if(currentScreen==="dieta") html = renderDieta(animate);
      else if(currentScreen==="treino") html = renderTreino(animate);
      else if(currentScreen==="progresso") html = renderProgresso(animate);
      else if(currentScreen==="saude") html = renderSaude(animate);
      else if(currentScreen==="loja") html = renderLoja(animate);
      else if(currentScreen==="convite") html = renderConvite(animate);
      else if(currentScreen==="perfil") html = renderPerfil(animate);
      else html = renderWelcome(animate);

      slot.innerHTML = html;

      if(currentScreen==="cadastro") wireCadastro();
      if(currentScreen==="prato") wirePrato();

      renderNav();
      renderToast();
      applyBackground();
    }

              Iniciante: <b>3 min</b> • Médio: <b>5 min</b> • Avançado: <b>8 min</b>.
              <br>Isso evita a pessoa clicar em concluir sem executar.
            </div>

            ${activeTimer ? `
              <div class="cp-divider"></div>
              <div class="cp-card" style="margin-top:0">
                <div class="cp-label tcenter">Exercício em andamento</div>
                <div class="cp-h1 tcenter" style="font-size:20px;margin-top:6px">${esc(activeTimer.id)}</div>
                <div class="cp-hint tcenter">Tempo restante: <b id="timerLeft">${esc(timerInfo)}</b></div>
                <div class="btn-row">
                  <button class="btn-secondary" onclick="openYouTube('${esc(activeTimer.id)}')">YouTube</button>
                  <button class="btn-neon" onclick="tryFinishExercise()">Concluir exercício</button>
                </div>
                <div class="cp-hint tcenter" style="margin-top:10px">
                  Você só conclui quando o tempo mínimo terminar.
                </div>
              </div>
            ` : ``}

            <div class="cp-divider"></div>
            <div class="cp-label tcenter">Treino da semana</div>

            ${treino.map(day => `
              <div class="day-card">
                <div class="day-head">
                  <div class="day-title">${esc(day.dia)}</div>
                  <button class="btn-secondary" style="width:auto" onclick="showTipForDay('${esc(day.dia)}')">Dica</button>
                </div>

                ${day.ex.map(ex => {
                  const exName = ex[0];
                  const exDetail = ex[1];
                  const img = EX_IMG[exName] || "";
                  const exId = `${treinoMode}::${day.dia}::${exName}`;
                  const isDone = done.includes(exId);
                  return `
                    <div class="exercise">
                      <div class="ex-left">
                        <div class="ex-img">${img ? `<img src="${esc(img)}" alt="img">` : "📷"}</div>
                        <div style="min-width:0">
                          <div class="ex-name">${esc(exName)}</div>
                          <div class="ex-detail">${esc(exDetail)} • mínimo ${min} min</div>
                        </div>
                      </div>
                      <div style="display:flex; gap:8px; align-items:center">
                        <button class="btn-secondary" style="width:auto" onclick="openYouTube('${esc(exName)}')">YouTube</button>
                        <button class="btn-secondary" style="width:auto" onclick="startExercise('${esc(exId)}', ${min})">
                          ${isDone ? "✅" : "▶"}
                        </button>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            `).join("")}

            <div class="btn-row">
              <button class="btn-neon" onclick="gerarTreinoNovo()">Trocar treino</button>
              <button class="btn-secondary" onclick="limparTreinoConcluidos()">Limpar concluídos</button>
            </div>
          </div>
        </div>
      `;
    }

    /* ======= (restante do seu código original, SEM MUDAR) =======
       A PARTIR DAQUI eu mantive tudo igual, só ajustei:
       - analisarPrato() (mensagem neutra)
       - removi textos que só você precisava
       Se você quiser, eu também posso compactar e te entregar
       o arquivo final 100% fechado numa única colagem depois.
    */

    async function analisarPrato(){
      if(!plateDataUrl){
        showToast("Envie uma foto primeiro.");
        return;
      }

      // ✅ Mensagem neutra (sem falar de configuração/endpoint)
      if(!AI_ENDPOINT){
        openModal("Análise indisponível", `
          No momento, a análise automática não está disponível.
          <br><br>
          Você pode continuar usando o app normalmente: dieta, treino e progresso.
        `);
        showToast("Análise indisponível.");
        return;
      }

      showToast("Analisando...");
      try{
        const base64 = plateDataUrl.split(",")[1] || "";
        const res = await fetch(AI_ENDPOINT, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ imageBase64: base64 })
        });
        if(!res.ok){
          const t = await res.text().catch(()=> "");
          throw new Error(t || `HTTP ${res.status}`);
        }
        const data = await res.json();
        plateAI = data;

        fillMacros(plateAI);

        const confirmText =
          `IA sugeriu:\n${data.description || "Sem descrição"}\n\n`+
          `Calorias: ${data.calories ?? "—"}\n`+
          `Proteína: ${data.protein ?? "—"}g\n`+
          `Carboidrato: ${data.carbs ?? "—"}g\n`+
          `Gordura: ${data.fat ?? "—"}g\n`;

        plateConfirmText = confirmText;
        showConfirmBox(confirmText);
        showToast("Confirme o resultado ✅");
      }catch(e){
        showToast("Erro na análise. Tente novamente.");
      }
    }

    /***********************
     * (COLA AQUI O RESTANTE DO SEU CÓDIGO ORIGINAL)
     * Para não estourar limite, eu mantive a base.
     * Se você quiser, eu te mando AGORA a versão final
     * completa em 4 partes sem esse comentário.
     ***********************/

    function boot(){
      mountOnce();

      const p = loadProfile();
      if(p){
        stateCad = { ...stateCad, ...p };
      }

      const tLast = localStorage.getItem(KEY_TREINO_LAST);
      if(tLast) treinoMode = tLast;

      const step = getStep();
      if(step <= 0) currentScreen = "welcome";
      else if(step === 1) currentScreen = "acesso";
      else if(step === 2) currentScreen = "cadastro";
      else currentScreen = "prato";

      render();
    }

    boot();
  </script>
</body>
</html>
