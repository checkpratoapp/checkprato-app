<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CheckPrato Elite — Dieta. Treino. Prato. Evolução.</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BS7KTD7E7X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BS7KTD7E7X');
  </script>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #02050b; color: #eaf2ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow-x: hidden; }
    body { background: radial-gradient(circle at 20% 0%, #0a1f38, #000) fixed; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .app-shell { width: 100%; min-height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .page-wrap { width: 100%; max-width: 430px; padding: 18px 18px 140px; overflow-y: auto; height: 100vh; }

    /* UI Components */
    .cp-card { background: linear-gradient(180deg, #0b1a2d, #07111f); border-radius: 22px; padding: 20px; margin-top: 14px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .btn-neon { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-weight: 900; border: none; border-radius: 50px; padding: 16px 24px; width: 100%; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(59,130,246,0.4); }
    .btn-outline { background: transparent; color: #eaf2ff; font-weight: 800; border: 1.5px solid rgba(234,242,255,0.3); border-radius: 50px; padding: 13px 24px; width: 100%; font-size: 15px; cursor: pointer; margin-top: 12px; }
    .cp-input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: #071728; color: #eaf2ff; outline: none; font-size: 16px; }
    
    .cp-label { font-size: 11px; font-weight: 900; letter-spacing: 0.8px; text-transform: uppercase; color: #8aa0c7; margin-top: 14px; display: block; }
    .cp-h1 { font-size: 28px; font-weight: 900; margin: 8px 0; }
    .cp-hint { color: #8aa0c7; font-size: 14px; line-height: 1.5; }

    /* 3D Viewer */
    .muscle-viewer { width: 100%; height: 380px; background: #071728; border-radius: 18px; border: 1px solid rgba(59,130,246,0.2); margin-top: 12px; overflow: hidden; position: relative; }
    model-viewer { width: 100%; height: 100%; }

    /* Navigation */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(7, 23, 40, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 10px 25px; z-index: 100; display: none; }
    .bottom-nav-inner { display: flex; justify-content: space-around; }
    .nav-btn { background: none; border: none; color: #8aa0c7; font-weight: 800; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 4px; }
    .nav-btn.active { color: #3b82f6; }

    .screen { display: none; }
    .screen.active { display: block; animation: screenIn 0.3s ease-out; }
    @keyframes screenIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .cp-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #3b82f6; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 800; z-index: 1000; transition: transform 0.3s; }
    .cp-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    /***********************
     * DATA & PERSISTENCE
     ***********************/
    const DB_KEY = "checkprato_db";
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
      user: { step: 1, email: "", nome: "" },
      stats: { xp: 150, pratos: 0, treinos: 0 }
    };

    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    function showToast(m) {
      const t = document.createElement("div"); t.className = "cp-toast show"; t.innerText = m;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
    }

    /***********************
     * NAVEGAÇÃO E FLUXO
     ***********************/
    function goTo(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(id);
      if(target) target.classList.add('active');
      
      const nav = document.getElementById('nav');
      if(nav) nav.style.display = (db.user.step >= 4) ? "block" : "none";
      
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.getAttribute('onclick')?.includes(id));
      });
      window.scrollTo(0,0);
    }

    function login() {
      const email = document.getElementById('inEmail').value;
      if(!email) return showToast("Insira seu e-mail");
      db.user.email = email;
      db.user.step = 2;
      save(); goTo('step2');
    }

    function saveProfile() {
      const nome = document.getElementById('inNome').value;
      if(!nome) return showToast("Diga-nos seu nome");
      db.user.nome = nome;
      db.user.step = 3;
      save(); goTo('step3');
    }

    function finishOnboarding() {
      db.user.step = 4;
      save(); goTo('dashboard');
    }

    /***********************
     * COMPARTILHAMENTO
     ***********************/
    async function shareInvite() {
      const text = `Boas! Estou usando o CheckPrato Elite para transformar meu corpo. Dá uma olhada:`;
      if (navigator.share) {
        try {
          await navigator.share({ title: 'CheckPrato Elite', text, url: window.location.href });
        } catch (e) {}
      } else {
        navigator.clipboard.writeText(text + " " + window.location.href);
        showToast("Link de convite copiado!");
      }
    }

    /***********************
     * RENDERIZAÇÃO INTERNA
     ***********************/
    function boot() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div class="app-shell">
          <div class="page-wrap">
            
            <div id="step1" class="screen ${db.user.step === 1 ? 'active' : ''}">
              <div style="text-align:center; padding-top:60px">
                <div style="font-size:60px">✅</div>
                <h1 class="cp-h1">CheckPrato Elite</h1>
                <p class="cp-hint">Dieta. Treino. Prato. Evolução.</p>
                <div class="cp-card">
                  <input id="inEmail" class="cp-input" placeholder="Seu melhor e-mail">
                  <button class="btn-neon" onclick="login()" style="width:100%; margin-top:15px">Começar Jornada</button>
                </div>
              </div>
            </div>

            <div id="step2" class="screen ${db.user.step === 2 ? 'active' : ''}">
              <h1 class="cp-h1">Personalizar</h1>
              <p class="cp-hint">Como devemos te chamar?</p>
              <div class="cp-card">
                <input id="inNome" class="cp-input" placeholder="Nome ou Apelido">
                <button class="btn-neon" onclick="saveProfile()" style="width:100%; margin-top:15px">Próximo</button>
              </div>
            </div>

            <div id="step3" class="screen ${db.user.step === 3 ? 'active' : ''}">
              <h1 class="cp-h1">Bem-vindo, ${db.user.nome}!</h1>
              <div class="cp-card">
                <p class="cp-hint">Seu perfil elite foi configurado. Agora você tem acesso ao controle total do seu corpo e dieta.</p>
                <button class="btn-neon" onclick="finishOnboarding()" style="width:100%; margin-top:20px">Acessar Painel</button>
              </div>
            </div>

            <div id="dashboard" class="screen ${db.user.step >= 4 ? 'active' : ''}">
              <h1 class="cp-h1">Sua Evolução</h1>
              <div class="cp-card">
                <label class="cp-label">Modelo Interativo 3D</label>
                <div class="muscle-viewer">
                  <model-viewer 
                    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
                    alt="Corpo Humano 3D" 
                    auto-rotate camera-controls shadow-intensity="1">
                  </model-viewer>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px">
                  <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; text-align:center">
                    <small style="color:#8aa0c7">XP</small><br><strong style="font-size:20px">${db.stats.xp}</strong>
                  </div>
                  <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; text-align:center">
                    <small style="color:#8aa0c7">RANK</small><br><strong style="font-size:20px">Elite</strong>
                  </div>
                </div>
              </div>
              <button class="btn-outline" onclick="shareInvite()" style="width:100%">📤 Convidar para a Elite</button>
            </div>

            <div id="prato" class="screen">
              <h1 class="cp-h1">Analisar Prato</h1>
              <div class="cp-card">
                <div style="width:100%; height:200px; background:#071728; border-radius:15px; display:flex; align-items:center; justify-content:center; border: 1px dashed rgba(255,255,255,0.2)">
                  <span style="color:#8aa0c7">Prévia da Foto</span>
                </div>
                <button class="btn-neon" onclick="showToast('Câmera em manutenção')" style="width:100%; margin-top:15px">📷 Tirar Foto</button>
              </div>
            </div>

          </div>
        </div>

        <nav class="bottom-nav" id="nav" style="${db.user.step >= 4 ? 'display:block' : 'display:none'}">
          <div class="bottom-nav-inner">
            <button class="nav-btn active" onclick="goTo('dashboard')"><span>🎯</span>Metas</button>
            <button class="nav-btn" onclick="goTo('prato')"><span>🍽️</span>Prato</button>
            <button class="nav-btn" onclick="showToast('Em breve...')"><span>🥗</span>Dieta</button>
            <button class="nav-btn" onclick="showToast('Em breve...')"><span>💪</span>Treino</button>
          </div>
        </nav>
      `;
    }

    window.onload = boot;
  </script>
</body>
</html>
