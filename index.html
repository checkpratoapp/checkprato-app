<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckPrato Elite</title><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script><style>
body{margin:0;background:#05070a;color:white;font-family:Poppins}
#app{max-width:480px;margin:auto;height:100vh;display:flex;flex-direction:column}
.page{flex:1;overflow:auto;padding:20px}
.card{background:#111827;padding:15px;border-radius:15px;margin-top:15px}
.btn{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:#3b82f6;color:white;font-weight:bold}
.nav{display:flex;justify-content:space-around;background:#000;padding:10px}

.avatar-wrap{display:flex;justify-content:center;margin-bottom:10px}
.avatar-body{width:120px;height:180px}

@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.avatar-body{animation:idle 3s infinite}

</style></head><body>
<div id="app"></div><script>

// CONFIG FIREBASE (JÁ USAR O SEU)
const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_AUTH",
databaseURL: "SEU_DB"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let state={screen:"dashboard",xp:0,user:null,premium:false,last:0};

// LOGIN
function login(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(u=>{
if(u){state.user=u;syncUser();}
render();
});

function syncUser(){
const ref=db.ref("users/"+state.user.uid);
ref.once("value",snap=>{
if(snap.exists()){
state.xp=snap.val().xp||0;
state.premium=snap.val().premium||false;
}else{
ref.set({xp:0,premium:false});
}
});
}

function save(){
db.ref("users/"+state.user.uid).update({xp:state.xp});
}

// ===== AVATAR FULL GAME =====
function avatar(){
let lvl=Math.floor(state.xp/100);

let shirt = lvl>=2 ? '#3b82f6' : '#666';
let pants = lvl>=4 ? '#10b981' : '#444';
let hat = lvl>=6 ? true : false;
let aura = lvl>=10 ? true : false;

return `
<svg class="avatar-body" viewBox="0 0 120 180">
${aura?'<circle cx="60" cy="90" r="70" fill="rgba(59,130,246,0.2)"/>' : ''}
<circle cx="60" cy="30" r="15" fill="#f1c27d"/>
${hat?'<rect x="45" y="5" width="30" height="10" fill="#111"/>' : ''}
<rect x="45" y="45" width="30" height="40" fill="'+shirt+'"/>
<rect x="45" y="85" width="12" height="50" fill="'+pants+'"/>
<rect x="63" y="85" width="12" height="50" fill="'+pants+'"/>
</svg>`;
}

// ===== XP ANTI BURRO =====
function gainXP(v){
let now=Date.now();
if(now-state.last<8000)return alert("Sem spam");
state.last=now;
state.xp+=v;
save();
render();
}

// ===== IA DIETA =====
function dietaIA(){
let base=["Frango","Arroz","Ovos","Salada"];
return base.map(x=>"• "+x).join("<br>");
}

// ===== IA TREINO =====
function treinoIA(){
return ["Agachamento","Flexão","Corrida"].map(x=>`<p>${x}</p>`).join("");
}

// ===== RANKING =====
function ranking(){
db.ref("users").orderByChild("xp").limitToLast(10).once("value",snap=>{
let pos=1;
let txt="";
snap.forEach(s=>{
txt+=pos+"º - "+(s.val().xp||0)+" XP\n";
pos++;
});
alert(txt);
});
}

// ===== PREMIUM =====
function checkPremium(){
if(!state.premium){
alert("Função Premium 🔒");
return false;
}
return true;
}

// NAV
function go(s){state.screen=s;render();}

function render(){

document.getElementById("app").innerHTML=`
<div class="page">

<div class="avatar-wrap">
${avatar()}
</div>

<p style="text-align:center">XP ${state.xp} | LVL ${Math.floor(state.xp/100)}</p>

${screen()}

</div>

<div class="nav">
<button onclick="go('dashboard')">Home</button>
<button onclick="go('prato')">Prato</button>
<button onclick="go('treino')">Treino</button>
<button onclick="go('perfil')">Perfil</button>
</div>
`;
}

function screen(){

if(!state.user)return `<div class="card"><button class="btn" onclick="login()">Login Google</button></div>`;

if(state.screen==='dashboard')return `<div class="card">Seu progresso desbloqueia roupas</div>`;

if(state.screen==='prato')return `
<div class="card">
<input type="file" accept="image/*">
<button class="btn" onclick="gainXP(20)">Analisar (+XP)</button>
</div>`;

if(state.screen==='treino')return `
<div class="card">
${treinoIA()}
<button class="btn" onclick="gainXP(50)">Treino concluído</button>
</div>`;

if(state.screen==='perfil')return `
<div class="card">
<button class="btn" onclick="ranking()">Ranking Global</button>
<button class="btn" onclick="checkPremium()">Função Premium</button>
</div>`;
}

render();

</script></body>
</html>
